<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1c1a18">
<title>Hunter House</title>

<!-- Re-added on import (Claude Design drops these): share/crawler + PWA metadata -->
<meta name="description" content="A visual walk through the Hunter Residence at 203 Goward Road, Saanich, British Columbia — photographs and original drawings from the Hunter House Foundation archive.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Hunter House Foundation">
<meta property="og:title" content="Hunter House">
<meta property="og:description" content="A visual walk through Richard Hunter's residence at 203 Goward Road, Saanich — photographs and original drawings.">
<meta property="og:image" content="https://archive.hunterhousefoundation.com/ivan-hunter-collection/previews/HH-IHC-0003_HunterHouse_2024_prev.jpg">
<meta property="og:url" content="https://www.hunterhousefoundation.com/gallery.html">
<link rel="canonical" href="https://www.hunterhousefoundation.com/gallery.html">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hunter House">
<link rel="apple-touch-icon" href="assets/icon-180.png">
<link rel="icon" type="image/png" href="assets/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1c1a18;
    --bg2:#211f1c;
    --fg:#f2ede4;
    --muted:#9c958a;
    --line:#322f2b;
    --serif:"Spectral",Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--fg);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- hero ---------- */
  .hero{
    position:relative;
    height:100svh;
    min-height:520px;
    width:100%;
    overflow:hidden;
    background:var(--bg2);
  }
  .hero-img{
    position:absolute;inset:0;
    width:100%;height:100%;
    object-fit:cover;
    object-position:center 42%;
    opacity:0;
    transition:opacity .9s ease;
  }
  .hero-img.loaded{opacity:1;}
  .hero-scrim{
    position:absolute;inset:0;
    background:
      linear-gradient(180deg, rgba(20,18,16,.40) 0%, rgba(20,18,16,0) 22%),
      linear-gradient(0deg, rgba(18,16,14,.92) 0%, rgba(18,16,14,.55) 24%, rgba(18,16,14,0) 52%);
  }
  .plate{
    position:absolute;
    left:0;right:0;
    bottom:calc(env(safe-area-inset-bottom) + 84px);
    padding:0 28px;
    text-align:center;
  }
  .eyebrow{
    margin:0;
    font-size:11.5px;
    letter-spacing:.34em;
    text-transform:uppercase;
    color:var(--muted);
    font-weight:500;
  }
  .plate h1{
    margin:.34em 0 0;
    font-family:var(--serif);
    font-weight:300;
    font-size:clamp(46px,15vw,76px);
    line-height:.96;
    letter-spacing:.005em;
    color:#fbf7f0;
  }
  .rule{
    width:34px;height:1px;
    background:var(--muted);
    opacity:.55;
    margin:20px auto 16px;
  }
  .meta{
    margin:0;
    font-size:12.5px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:#cabfae;
    line-height:1.7;
  }
  .meta span{display:block;}
  .meta .sub{color:var(--muted);font-size:11px;letter-spacing:.16em;}
  .cue{
    position:absolute;
    left:50%;transform:translateX(-50%);
    bottom:calc(env(safe-area-inset-bottom) + 26px);
    color:var(--muted);
    font-size:18px;
    animation:bob 2.4s ease-in-out infinite;
  }
  @media(prefers-reduced-motion:reduce){ .cue{animation:none;} }
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(6px);}}

  /* ---------- reel ---------- */
  .reel{
    display:block;
    width:100%;
    max-width:760px;
    margin:0 auto;
    padding-bottom:calc(env(safe-area-inset-bottom) + 56px);
  }
  .shot{
    position:relative;
    display:block;
    width:100%;
    padding:0;border:0;
    background:var(--bg2);
    cursor:pointer;
    overflow:hidden;
  }
  .shot + .shot{ margin-top:5px; }
  .shot img{
    width:100%;height:auto;
    display:block;
    opacity:0;
    transition:opacity .5s ease;
  }
  .shot img.loaded{opacity:1;}
  .shot:active{filter:brightness(.84);}
  .shot .idx{
    position:absolute;
    top:12px;left:14px;
    font-size:11px;letter-spacing:.16em;
    color:#f3eee4;
    text-shadow:0 1px 6px rgba(0,0,0,.6);
    font-variant-numeric:tabular-nums;
    pointer-events:none;
  }

  /* drawings divider */
  .divider{
    display:flex;align-items:center;gap:16px;
    max-width:760px;
    margin:0 auto;
    padding:42px 28px 30px;
  }
  .divider::before,.divider::after{
    content:"";flex:1;height:1px;background:var(--line);
  }
  .divider span{
    font-size:11px;letter-spacing:.26em;text-transform:uppercase;
    color:var(--muted);white-space:nowrap;
  }

  /* ---------- footer (discreet links back into the site) ---------- */
  .foot{
    max-width:760px;
    margin:0 auto;
    padding:30px 28px calc(env(safe-area-inset-bottom) + 44px);
    display:flex;flex-wrap:wrap;gap:12px 20px;
    align-items:baseline;justify-content:center;text-align:center;
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--muted);
  }
  .foot a{
    color:var(--muted);text-decoration:none;
    border-bottom:1px solid transparent;padding-bottom:2px;
    transition:color .15s ease,border-color .15s ease;
  }
  .foot a:hover{color:var(--fg);border-color:var(--line);}
  .foot .sep{opacity:.4;}

  /* ---------- lightbox ---------- */
  .lb{position:fixed;inset:0;background:#0d0c0b;display:none;z-index:50;touch-action:pan-y;}
  .lb.open{display:block;}
  .lb-track{position:absolute;inset:0;display:flex;transition:transform .32s cubic-bezier(.22,.61,.36,1);will-change:transform;}
  .lb-track.dragging{transition:none;}
  .lb-slide{flex:0 0 100%;height:100%;display:flex;align-items:center;justify-content:center;padding:0 12px;}
  .lb-slide img{max-width:100%;max-height:100%;object-fit:contain;display:block;}
  .lb-top{position:absolute;top:0;left:0;right:0;padding:calc(env(safe-area-inset-top) + 14px) 18px 14px;display:flex;align-items:center;justify-content:space-between;z-index:2;background:linear-gradient(#0d0c0bcc,#0d0c0b00);pointer-events:none;}
  .lb-count{font-size:12px;letter-spacing:.14em;color:#d8d2c8;font-variant-numeric:tabular-nums;}
  .lb-close{pointer-events:auto;background:none;border:none;color:#d8d2c8;font-size:26px;line-height:1;padding:4px 8px;cursor:pointer;}
  .lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:40px;line-height:1;padding:18px;cursor:pointer;opacity:.55;display:none;z-index:2;}
  .lb-nav:hover{opacity:1;}
  .lb-prev{left:4px;} .lb-next{right:4px;}
  @media(hover:hover) and (min-width:760px){ .lb-nav{display:block;} }
</style>
</head>
<body>

<section class="hero">
  <img class="hero-img" id="hero" alt="The Hunter Residence, 203 Goward Road">
  <div class="hero-scrim"></div>
  <div class="plate">
    <h1>Hunter House</h1>
    <div class="rule"></div>
    <p class="meta">
      <span>203 Goward Road · Saanich</span>
      <span class="sub">Richard Hunter · Built 1970</span>
    </p>
  </div>
  <div class="cue" aria-hidden="true">&#8595;</div>
</section>

<main class="reel" id="reel"></main>

<footer class="foot">
  <a href="index.html">Hunter House Foundation</a>
  <span class="sep" aria-hidden="true">&middot;</span>
  <a href="browse.html">Enter the full archive &rarr;</a>
</footer>

<div class="lb" id="lb" aria-hidden="true">
  <div class="lb-top">
    <span class="lb-count" id="count"></span>
    <button class="lb-close" id="close" aria-label="Close">&times;</button>
  </div>
  <button class="lb-nav lb-prev" id="prev" aria-label="Previous">&#8249;</button>
  <button class="lb-nav lb-next" id="next" aria-label="Next">&#8250;</button>
  <div class="lb-track" id="track"></div>
</div>

<script>
const ARCHIVE = "https://archive.hunterhousefoundation.com";
const IHC = "ivan-hunter-collection";
const IDS = ["0003","0006","0008","0009","0015","0016","0017","0018","0024","0028","0029","0030","0036","0037","0038","0039"];
const photos = IDS.map(id => ({
  thumb: `${ARCHIVE}/${IHC}/thumbs/HH-IHC-${id}_HunterHouse_2024_thumb.jpg`,
  full:  `${ARCHIVE}/${IHC}/previews/HH-IHC-${id}_HunterHouse_2024_prev.jpg`
}));
const DRAW_START = photos.length;
const CAA = "canadian-architecture-archive";
const DRAWINGS = [
  "HH-CAA-0018_Scheme_II_Pencil_Studies_Coloured_Legend_3of3_1985-01-01",
  "HH-CAA-0007_OG_Build_1970_Scheme_1_1of3_1970-08-25"
];
DRAWINGS.forEach(name => photos.push({
  thumb: `${ARCHIVE}/${CAA}/thumbs/${name}_thumb.jpg`,
  full:  `${ARCHIVE}/${CAA}/previews/${name}_prev.jpg`
}));

/* hero */
const hero = document.getElementById('hero');
hero.addEventListener('load', ()=>hero.classList.add('loaded'));
hero.src = photos[0].full;

/* reel — full-bleed photos at native aspect, sharpening as you scroll */
const reel = document.getElementById('reel');
const io = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(!e.isIntersecting) return;
    const img = e.target;
    const full = img.dataset.full;
    if(full && img.dataset.up!=='1'){
      img.dataset.up='1';
      const hi = new Image();
      hi.onload = ()=>{ img.src = full; };
      hi.src = full;
    }
    io.unobserve(img);
  });
}, {rootMargin:"600px 0px"});

photos.forEach((p,i)=>{
  if(i===DRAW_START){
    const d = document.createElement('div');
    d.className='divider';
    d.innerHTML='<span>Original Drawings</span>';
    reel.appendChild(d);
  }
  const btn = document.createElement('button');
  btn.className='shot';
  btn.setAttribute('aria-label', `Photo ${i+1}`);
  const img = document.createElement('img');
  img.decoding='async';
  img.dataset.full=p.full;
  img.src=p.thumb;                 // quick placeholder
  img.addEventListener('load', ()=>img.classList.add('loaded'));
  const idx = document.createElement('span');
  idx.className='idx';
  idx.textContent = String(i+1).padStart(2,'0');
  btn.appendChild(img);
  btn.appendChild(idx);
  btn.addEventListener('click', ()=>open(i));
  reel.appendChild(btn);
  io.observe(img);
});

/* ---------- lightbox ---------- */
const lb = document.getElementById('lb');
const track = document.getElementById('track');
const count = document.getElementById('count');
let cur = 0, built = false;

function buildSlides(){
  if(built) return;
  photos.forEach((p)=>{
    const s = document.createElement('div');
    s.className='lb-slide';
    const img = document.createElement('img');
    img.src = p.thumb;
    img.dataset.full = p.full;
    img.alt = '';
    s.appendChild(img);
    track.appendChild(s);
  });
  built = true;
}
function loadNear(){
  [...track.children].forEach((s,i)=>{
    const img = s.firstChild;
    if(Math.abs(i-cur)<=1 && img.dataset.full){
      const full = img.dataset.full;
      delete img.dataset.full;
      const hi = new Image();
      hi.onload = ()=>{ img.src = full; };
      hi.src = full;
    }
  });
}
function setPos(animate){
  track.classList.toggle('dragging', !animate);
  track.style.transform = `translateX(${-cur*100}%)`;
  count.textContent = `${cur+1} / ${photos.length}`;
}
function open(i){
  buildSlides();
  cur = i;
  lb.classList.add('open');
  lb.setAttribute('aria-hidden','false');
  document.body.style.overflow='hidden';
  setPos(false);
  requestAnimationFrame(()=>track.classList.remove('dragging'));
  loadNear();
}
function close(){
  lb.classList.remove('open');
  lb.setAttribute('aria-hidden','true');
  document.body.style.overflow='';
}
function go(d){
  cur = Math.min(photos.length-1, Math.max(0, cur+d));
  setPos(true);
  loadNear();
}
document.getElementById('close').addEventListener('click', close);
document.getElementById('prev').addEventListener('click', ()=>go(-1));
document.getElementById('next').addEventListener('click', ()=>go(1));

// Swipe to advance. Axis-locked: once a gesture is judged horizontal we own it
// (preventDefault stops the browser from scrolling/refreshing mid-swipe); a
// vertical gesture is left alone. touchmove is non-passive so preventDefault works.
let x0=0, y0=0, dx=0, dragging=false, axis=null;
track.addEventListener('touchstart', e=>{
  x0=e.touches[0].clientX; y0=e.touches[0].clientY;
  dx=0; dragging=true; axis=null;
  track.classList.add('dragging');
}, {passive:true});
track.addEventListener('touchmove', e=>{
  if(!dragging) return;
  dx = e.touches[0].clientX - x0;
  const dy = e.touches[0].clientY - y0;
  if(axis===null && (Math.abs(dx)>8 || Math.abs(dy)>8))
    axis = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
  if(axis!=='x') return;            // vertical (or undecided) — don't grab it
  e.preventDefault();              // horizontal swipe is ours
  const w = lb.clientWidth;
  let off = -cur*w + dx;
  if((cur===0 && dx>0) || (cur===photos.length-1 && dx<0)) off = -cur*w + dx*0.35;
  track.style.transform = `translateX(${off}px)`;
}, {passive:false});
track.addEventListener('touchend', ()=>{
  if(!dragging) return;
  dragging=false;
  if(axis!=='x'){ setPos(false); return; }   // not a horizontal swipe — re-snap, no animation
  const w = lb.clientWidth;
  if(dx < -w*0.18) cur = Math.min(photos.length-1, cur+1);
  else if(dx > w*0.18) cur = Math.max(0, cur-1);
  setPos(true);
  loadNear();
});

window.addEventListener('keydown', e=>{
  if(!lb.classList.contains('open')) return;
  if(e.key==='Escape') close();
  else if(e.key==='ArrowRight') go(1);
  else if(e.key==='ArrowLeft') go(-1);
});

// Keep the current slide centred across orientation changes / viewport resizes.
// setPos(false) re-applies a percentage transform, so it's correct at any width.
function recenter(){ if(lb.classList.contains('open')) setPos(false); }
window.addEventListener('resize', recenter);
window.addEventListener('orientationchange', ()=>setTimeout(recenter, 80));
</script>

<!-- PWA: register the shell service worker (re-added on import). -->
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>
</html>

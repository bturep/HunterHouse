<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1c1a18">
<title>Hunter House</title>

<!-- Re-added on import (Claude Design drops these): share/crawler + PWA metadata -->
<meta name="description" content="A visual walk through the Hunter Residence at 203 Goward Road, Saanich, British Columbia — photographs and original drawings from the Hunter House Foundation archive.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Hunter House Foundation">
<meta property="og:title" content="Hunter House">
<meta property="og:description" content="A visual walk through Richard Hunter's residence at 203 Goward Road, Saanich — photographs and original drawings.">
<meta property="og:image" content="https://archive.hunterhousefoundation.com/ivan-hunter-collection/previews/HH-IHC-0003_HunterHouse_2024_prev.jpg">
<meta property="og:url" content="https://www.hunterhousefoundation.com/gallery.html">
<link rel="canonical" href="https://www.hunterhousefoundation.com/gallery.html">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hunter House">
<link rel="apple-touch-icon" href="assets/icon-180.png">
<link rel="icon" type="image/png" href="assets/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/photoswipe/photoswipe.css">
<style>
  :root{
    --bg:#1c1a18;
    --bg2:#211f1c;
    --fg:#f2ede4;
    --muted:#9c958a;
    --line:#322f2b;
    --serif:"Spectral",Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--fg);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- hero ---------- */
  .hero{
    position:relative;
    height:100svh;
    min-height:520px;
    width:100%;
    overflow:hidden;
    background:var(--bg2);
  }
  .hero-img{
    position:absolute;inset:0;
    width:100%;height:100%;
    object-fit:cover;
    object-position:center 42%;
    opacity:0;
    transition:opacity .9s ease;
  }
  .hero-img.loaded{opacity:1;}
  .hero-scrim{
    position:absolute;inset:0;
    background:
      linear-gradient(180deg, rgba(20,18,16,.40) 0%, rgba(20,18,16,0) 22%),
      linear-gradient(0deg, rgba(18,16,14,.92) 0%, rgba(18,16,14,.55) 24%, rgba(18,16,14,0) 52%);
  }
  .plate{
    position:absolute;
    left:0;right:0;
    bottom:calc(env(safe-area-inset-bottom) + 84px);
    padding:0 28px;
    text-align:center;
  }
  .plate h1{
    margin:.34em 0 0;
    font-family:var(--serif);
    font-weight:300;
    font-size:clamp(46px,15vw,76px);
    line-height:.96;
    letter-spacing:.005em;
    color:#fbf7f0;
  }
  .rule{
    width:34px;height:1px;
    background:var(--muted);
    opacity:.55;
    margin:20px auto 16px;
  }
  .meta{
    margin:0;
    font-size:12.5px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:#cabfae;
    line-height:1.7;
  }
  .meta span{display:block;}
  .meta .sub{color:var(--muted);font-size:11px;letter-spacing:.16em;}
  .cue{
    position:absolute;
    left:50%;transform:translateX(-50%);
    bottom:calc(env(safe-area-inset-bottom) + 26px);
    color:var(--muted);
    font-size:18px;
    animation:bob 2.4s ease-in-out infinite;
  }
  @media(prefers-reduced-motion:reduce){ .cue{animation:none;} }
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(6px);}}

  /* ---------- reel ---------- */
  .reel{
    display:block;
    width:100%;
    max-width:760px;
    margin:0 auto;
  }
  .shot{
    position:relative;
    display:block;
    width:100%;
    padding:0;border:0;
    background:var(--bg2);
    cursor:zoom-in;
    overflow:hidden;
  }
  .shot + .shot{ margin-top:5px; }
  .shot img{
    width:100%;height:auto;
    display:block;
    opacity:0;
    transition:opacity .5s ease;
  }
  .shot img.loaded{opacity:1;}
  .shot:active{filter:brightness(.84);}
  .shot .idx{
    position:absolute;
    top:12px;left:14px;
    font-size:11px;letter-spacing:.16em;
    color:#f3eee4;
    text-shadow:0 1px 6px rgba(0,0,0,.6);
    font-variant-numeric:tabular-nums;
    pointer-events:none;
  }

  /* drawings divider */
  .divider{
    display:flex;align-items:center;gap:16px;
    max-width:760px;
    margin:0 auto;
    padding:42px 28px 30px;
  }
  .divider::before,.divider::after{
    content:"";flex:1;height:1px;background:var(--line);
  }
  .divider span{
    font-size:11px;letter-spacing:.26em;text-transform:uppercase;
    color:var(--muted);white-space:nowrap;
  }

  /* Richard Hunter architect's stamp — the sign-off, and the link into the
     archive. Extra bottom room so it clears Safari's toolbar and scrolls past. */
  .endmark{
    display:flex;justify-content:center;
    padding:46px 28px calc(env(safe-area-inset-bottom) + 80px);
  }
  .endlink{display:inline-flex;line-height:0;border-radius:2px;}
  .endlink:focus-visible{outline:2px solid var(--muted);outline-offset:8px;}
  .sigil{
    width:clamp(132px, 34vw, 156px);height:auto;
    opacity:.42;filter:invert(1);
    transition:opacity .18s ease;
    -webkit-user-select:none;user-select:none;
  }
  .endlink:hover .sigil{opacity:.72;}

  /* PhotoSwipe theming + hide the zoom button (pinch / double-tap zoom instead) */
  .pswp{--pswp-bg:#0d0c0b;--pswp-placeholder-bg:#211f1c;}
  .pswp__button--zoom{display:none!important;}
</style>
</head>
<body>

<section class="hero">
  <img class="hero-img" id="hero" alt="The Hunter Residence, 203 Goward Road at dusk">
  <div class="hero-scrim"></div>
  <div class="plate">
    <h1>Hunter House</h1>
    <div class="rule"></div>
    <p class="meta">
      <span>203 Goward Road · Saanich</span>
      <span class="sub">Richard Hunter · Built 1970</span>
    </p>
  </div>
  <div class="cue" aria-hidden="true">&#8595;</div>
</section>

<main class="reel" id="reel"></main>

<div class="endmark">
  <a class="endlink" href="browse.html" aria-label="Enter the full archive">
    <img class="sigil" src="assets/hunter-mark.png" alt="Richard Hunter, Architect — emblem" width="140" height="141">
  </a>
</div>

<script type="module">
import PhotoSwipeLightbox from './assets/photoswipe/photoswipe-lightbox.esm.js';

// Each slide carries its real preview pixel size so PhotoSwipe zooms accurately.
const SLIDES = [
  {id:"HH-IHC-0008", t:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/thumbs/HH-IHC-0008_HunterHouse_2024_thumb.jpg", f:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/previews/HH-IHC-0008_HunterHouse_2024_prev.jpg", w:1486, h:2000, alt:"The Hunter Residence, 203 Goward Road, Saanich — photograph (HH-IHC-0008)"},
  {id:"HH-IHC-0009", t:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/thumbs/HH-IHC-0009_HunterHouse_2024_thumb.jpg", f:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/previews/HH-IHC-0009_HunterHouse_2024_prev.jpg", w:2000, h:840, alt:"The Hunter Residence, 203 Goward Road, Saanich — photograph (HH-IHC-0009)"},
  {id:"HH-IHC-0015", t:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/thumbs/HH-IHC-0015_HunterHouse_2024_thumb.jpg", f:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/previews/HH-IHC-0015_HunterHouse_2024_prev.jpg", w:1425, h:2000, alt:"The Hunter Residence, 203 Goward Road, Saanich — photograph (HH-IHC-0015)"},
  {id:"HH-IHC-0016", t:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/thumbs/HH-IHC-0016_HunterHouse_2024_thumb.jpg", f:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/previews/HH-IHC-0016_HunterHouse_2024_prev.jpg", w:1630, h:2000, alt:"The Hunter Residence, 203 Goward Road, Saanich — photograph (HH-IHC-0016)"},
  {id:"HH-IHC-0017", t:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/thumbs/HH-IHC-0017_HunterHouse_2024_thumb.jpg", f:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/previews/HH-IHC-0017_HunterHouse_2024_prev.jpg", w:1392, h:2000, alt:"The Hunter Residence, 203 Goward Road, Saanich — photograph (HH-IHC-0017)"},
  {id:"HH-IHC-0018", t:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/thumbs/HH-IHC-0018_HunterHouse_2024_thumb.jpg", f:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/previews/HH-IHC-0018_HunterHouse_2024_prev.jpg", w:2000, h:1333, alt:"The Hunter Residence, 203 Goward Road, Saanich — photograph (HH-IHC-0018)"},
  {id:"HH-IHC-0024", t:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/thumbs/HH-IHC-0024_HunterHouse_2024_thumb.jpg", f:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/previews/HH-IHC-0024_HunterHouse_2024_prev.jpg", w:2000, h:1391, alt:"The Hunter Residence, 203 Goward Road, Saanich — photograph (HH-IHC-0024)"},
  {id:"HH-IHC-0028", t:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/thumbs/HH-IHC-0028_HunterHouse_2024_thumb.jpg", f:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/previews/HH-IHC-0028_HunterHouse_2024_prev.jpg", w:2000, h:991, alt:"The Hunter Residence, 203 Goward Road, Saanich — photograph (HH-IHC-0028)"},
  {id:"HH-IHC-0029", t:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/thumbs/HH-IHC-0029_HunterHouse_2024_thumb.jpg", f:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/previews/HH-IHC-0029_HunterHouse_2024_prev.jpg", w:2000, h:799, alt:"The Hunter Residence, 203 Goward Road, Saanich — photograph (HH-IHC-0029)"},
  {id:"HH-IHC-0030", t:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/thumbs/HH-IHC-0030_HunterHouse_2024_thumb.jpg", f:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/previews/HH-IHC-0030_HunterHouse_2024_prev.jpg", w:2000, h:1312, alt:"The Hunter Residence, 203 Goward Road, Saanich — photograph (HH-IHC-0030)"},
  {id:"HH-IHC-0036", t:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/thumbs/HH-IHC-0036_HunterHouse_2024_thumb.jpg", f:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/previews/HH-IHC-0036_HunterHouse_2024_prev.jpg", w:2000, h:1016, alt:"The Hunter Residence, 203 Goward Road, Saanich — photograph (HH-IHC-0036)"},
  {id:"HH-IHC-0037", t:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/thumbs/HH-IHC-0037_HunterHouse_2024_thumb.jpg", f:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/previews/HH-IHC-0037_HunterHouse_2024_prev.jpg", w:2000, h:1229, alt:"The Hunter Residence, 203 Goward Road, Saanich — photograph (HH-IHC-0037)"},
  {id:"HH-IHC-0039", t:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/thumbs/HH-IHC-0039_HunterHouse_2024_thumb.jpg", f:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/previews/HH-IHC-0039_HunterHouse_2024_prev.jpg", w:2000, h:1333, alt:"The Hunter Residence, 203 Goward Road, Saanich — photograph (HH-IHC-0039)"},
  {id:"HH-IHC-0038", t:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/thumbs/HH-IHC-0038_HunterHouse_2024_thumb.jpg", f:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/previews/HH-IHC-0038_HunterHouse_2024_prev.jpg", w:2000, h:1734, alt:"The Hunter Residence, 203 Goward Road, Saanich — photograph (HH-IHC-0038)"},
  {id:"HH-IHC-0003", t:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/thumbs/HH-IHC-0003_HunterHouse_2024_thumb.jpg", f:"https://archive.hunterhousefoundation.com/ivan-hunter-collection/previews/HH-IHC-0003_HunterHouse_2024_prev.jpg", w:2000, h:1869, alt:"The Hunter Residence, 203 Goward Road, Saanich — photograph (HH-IHC-0003)"},
  {id:"HH-CAA-0018", t:"https://archive.hunterhousefoundation.com/canadian-architecture-archive/thumbs/HH-CAA-0018_Scheme_II_Pencil_Studies_Coloured_Legend_3of3_1985-01-01_thumb.jpg", f:"https://archive.hunterhousefoundation.com/canadian-architecture-archive/previews/HH-CAA-0018_Scheme_II_Pencil_Studies_Coloured_Legend_3of3_1985-01-01_prev.jpg", w:2000, h:1995, alt:"Scheme II coloured pencil studies — house, studio and garden. Richard Hunter, 1985 (HH-CAA-0018)"},
  {id:"HH-CAA-0007", t:"https://archive.hunterhousefoundation.com/canadian-architecture-archive/thumbs/HH-CAA-0007_OG_Build_1970_Scheme_1_1of3_1970-08-25_thumb.jpg", f:"https://archive.hunterhousefoundation.com/canadian-architecture-archive/previews/HH-CAA-0007_OG_Build_1970_Scheme_1_1of3_1970-08-25_prev.jpg", w:2000, h:1352, alt:"Original 1970 build, Scheme 1 — ground plan. Richard Hunter, 1970 (HH-CAA-0007)"}
];
const DRAW_START = 15;
const HERO_SRC = "https://archive.hunterhousefoundation.com/ivan-hunter-collection/previews/HH-IHC-0003_HunterHouse_2024_prev.jpg";

/* hero — pinned to the IHC-0003 exterior (independent of reel order) */
const hero = document.getElementById('hero');
hero.addEventListener('load', ()=>hero.classList.add('loaded'));
hero.src = HERO_SRC;

/* reel — thumbnails that sharpen to the preview as you scroll */
const reel = document.getElementById('reel');
const io = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(!e.isIntersecting) return;
    const img = e.target, full = img.dataset.full;
    if(full && img.dataset.up!=='1'){
      img.dataset.up='1';
      const hi = new Image();
      hi.onload = ()=>{ img.src = full; };
      hi.src = full;
    }
    io.unobserve(img);
  });
}, {rootMargin:"600px 0px"});

SLIDES.forEach((p,i)=>{
  if(i===DRAW_START){
    const d = document.createElement('div');
    d.className='divider';
    d.innerHTML='<span>Original Drawings</span>';
    reel.appendChild(d);
  }
  const btn = document.createElement('button');
  btn.className='shot';
  btn.type='button';
  btn.setAttribute('aria-label', `Open image ${i+1}: ${p.id}`);
  const img = document.createElement('img');
  img.decoding='async';
  img.alt = p.alt;
  img.dataset.full = p.f;
  img.src = p.t;                    // quick thumbnail
  img.addEventListener('load', ()=>img.classList.add('loaded'));
  const idx = document.createElement('span');
  idx.className='idx';
  idx.textContent = String(i+1).padStart(2,'0');
  btn.appendChild(img);
  btn.appendChild(idx);
  btn.addEventListener('click', ()=>lightbox.loadAndOpen(i));
  reel.appendChild(btn);
  io.observe(img);
});

/* fullscreen viewer — swipe between images, pinch / double-tap to zoom,
   rotation handled by PhotoSwipe. Self-hosted, no external dependency. */
const lightbox = new PhotoSwipeLightbox({
  dataSource: SLIDES.map(s=>({src:s.f, msrc:s.t, width:s.w, height:s.h, alt:s.alt})),
  pswpModule: () => import('./assets/photoswipe/photoswipe.esm.js'),
  bgOpacity: 1,
  initialZoomLevel: 'fit',
  secondaryZoomLevel: 2.2,
  maxZoomLevel: 4,
  wheelToZoom: true,
  loop: false,
  pinchToClose: false
});
lightbox.init();
</script>

<!-- PWA: register the shell service worker (re-added on import). -->
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>
</html>

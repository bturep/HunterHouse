<script>
  // Staged load: thumb paints instantly (it's the in-flow layout image);
  // the 2000px preview is fetched lazily as each frame nears the viewport and
  // fades in over the thumb. Keeps 18 images fast on first paint.
  (function(){
    var fulls = document.querySelectorAll('.full[data-src]');
    function reveal(img){
      var hi = new Image();
      hi.onload = function(){ img.src = img.dataset.src; img.classList.add('ready'); };
      hi.src = img.dataset.src;
    }
    if('IntersectionObserver' in window){
      var io = new IntersectionObserver(function(entries){
        entries.forEach(function(e){
          if(e.isIntersecting){ reveal(e.target); io.unobserve(e.target); }
        });
      }, {rootMargin:'600px 0px'});
      fulls.forEach(function(img){ io.observe(img); });
    } else {
      fulls.forEach(reveal);
    }
  })();
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hunter House Foundation</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark">
<link rel="manifest" href="/HunterHouse/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HH Archive">
<link rel="apple-touch-icon" href="/HunterHouse/assets/icon-180.png">
<link rel="preload" as="image" href="https://archive.hunterhousefoundation.com/web/media/HH-Splash-poster.jpg">
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#1a1816;color:#f3f1ec;font-family:'SF Mono','JetBrains Mono',ui-monospace,Menlo,monospace}

  .splash{
    position:fixed;inset:0;cursor:pointer;
    display:flex;flex-direction:column;
    text-decoration:none;color:inherit;
  }

  .film{
    position:absolute;inset:0;overflow:hidden;
    transform:translateZ(0);
  }
  .film::after{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:2;
    background:radial-gradient(ellipse at center, rgba(0,0,0,0.10) 0%, rgba(0,0,0,0.45) 85%);
  }
  .film video{opacity:0;transition:opacity 900ms ease-in-out;position:absolute;top:50%;left:50%;width:max(100vw,calc(100vh*16/9));height:max(100vh,calc(100vw*9/16));transform:translate(-50%,-50%);object-fit:cover}
  .film video.show{opacity:1}

  .splash .mark{
    position:absolute;left:18%;top:50%;
    transform:translateY(-50%);
    padding:28px 36px;
    display:flex;flex-direction:column;align-items:flex-start;text-align:left;gap:2px;
    font-family:'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace;
    font-size:2.6vw;font-weight:700;letter-spacing:0.18em;line-height:1.2;
    text-transform:uppercase;color:#f3f1ec;
    text-shadow:0 2px 12px rgba(0,0,0,0.45);
    z-index:5;pointer-events:none;
    opacity:0;animation:mark-in 700ms ease-out 450ms forwards;
  }
  .splash .mark span{display:block}
  @keyframes mark-in{
    from{opacity:0}
    to  {opacity:1}
  }

  .splash.exiting{pointer-events:none;cursor:default;animation:splash-out 550ms ease-in-out forwards}
  @keyframes splash-out{to{opacity:0}}

  .splash .enter{
    position:absolute;right:36px;bottom:32px;z-index:5;
    font-family:'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace;font-size:13px;color:#9dc2b2;
    letter-spacing:0.28em;text-transform:uppercase;
    display:flex;align-items:center;gap:14px;
    text-shadow:0 1px 8px rgba(0,0,0,0.6);
    pointer-events:none;
    opacity:0;animation:fade-in 700ms ease-out 1300ms forwards;
  }
  .splash .enter .arrow{color:#9dc2b2;font-size:13px;letter-spacing:0;animation:enter-pulse 2.4s ease-in-out 3000ms infinite}
  @keyframes fade-in{from{opacity:0}to{opacity:1}}
  @keyframes enter-pulse{0%,100%{transform:translateX(0)}50%{transform:translateX(4px)}}

  .splash .imprint{
    position:absolute;left:36px;top:28px;z-index:5;
    font-family:'SF Mono','JetBrains Mono',ui-monospace,Menlo,monospace;font-size:10.5px;color:rgba(243,241,236,0.45);
    letter-spacing:0.18em;text-transform:uppercase;
    pointer-events:none;
    opacity:0;animation:fade-in 700ms ease-out 1500ms forwards;
  }
  .splash .imprint b{color:#d49a86;font-weight:500;margin-right:8px}

  .splash:hover .enter{color:#f3f1ec}
  .splash:active{transform:scale(0.998)}

  @media (max-width:767px){
    .splash .mark{font-size:6vw;left:8%;padding:18px 22px}
    .splash .enter{right:20px;bottom:24px}
    .splash .imprint{left:20px}
  }

  /* Portrait lock */
  #rotate-msg{
    display:none;position:fixed;inset:0;z-index:99999;
    background:#000;color:rgba(243,241,236,0.7);
    flex-direction:column;align-items:center;justify-content:center;
    gap:16px;font-family:'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace;
    font-size:11px;letter-spacing:0.18em;text-transform:uppercase;pointer-events:none;
  }
  #rotate-msg svg{opacity:0.45}
  @media screen and (orientation:landscape) and (max-height:500px){
    #rotate-msg{display:flex}
  }
</style>
</head>
<body>
<div id="rotate-msg">
  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
  <span>Rotate to portrait</span>
</div>

<a href="browse.html" class="splash" id="splash" aria-label="Enter the Hunter House Foundation archive">
  <div class="film" id="film">
    <video id="film-video" autoplay loop muted playsinline preload="auto"></video>
  </div>
  <div class="imprint"><b>2026.05</b>v1.03.25</div>
  <div class="mark">
    <span>Hunter</span>
    <span>House</span>
    <span>Foundation</span>
    <span>Archive</span>
  </div>
  <div class="enter"><span>Enter to Archive</span><span class="arrow">→</span></div>
</a>

<script>
  const splash = document.getElementById('splash');
  const video  = document.getElementById('film-video');

  const R2 = 'https://archive.hunterhousefoundation.com/web/media';
  const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  const fast = conn && !conn.saveData && conn.effectiveType === '4g' && (conn.downlink || 10) >= 5;
  video.src = fast ? `${R2}/HH-Splash4k.mp4` : `${R2}/HH-Splash1080.mp4`;

  // Poster is preloaded in <head> (network fetch starts at parse time).
  // Set it here in JS so the video element never renders it before
  // CSS opacity:0 has been composited — avoids first-frame flash.
  // Start the fade only when decode() confirms it is GPU-ready.
  const posterSrc = `${R2}/HH-Splash-poster.jpg`;
  // Double-rAF: first frame paints video at opacity:0, second frame triggers
  // the transition — ensures it fires on cached loads where decode() resolves
  // before the first paint.
  const go = () => requestAnimationFrame(() => requestAnimationFrame(() => video.classList.add('show')));
  const img = new Image();
  img.src = posterSrc;
  img.decode ? img.decode().then(() => { video.poster = posterSrc; go(); }, go)
             : (img.onload = () => { video.poster = posterSrc; go(); }, img.onerror = go);
  setTimeout(go, 1500);

  // Click → animate out → navigate to browse
  splash.addEventListener('click', (e) => {
    e.preventDefault();
    if (splash.classList.contains('exiting')) return;
    splash.classList.add('exiting');
    sessionStorage.setItem('hhf_splash', '1');
    setTimeout(() => { window.location.href = 'browse.html'; }, 570);
  });
</script>

<script>
  // Fire SPARQL prefetch so browse.html loads instantly from sessionStorage.
  // Runs fire-and-forget — any error is silently swallowed.
  (function () {
    try {
      const existing = sessionStorage.getItem("hhf_prefetch");
      if (existing) {
        const { ts } = JSON.parse(existing);
        if (Date.now() - ts < 300000) return; // fresh prefetch already in place
      }
    } catch {}

    const SPARQL = "https://hunterhouse.wikibase.cloud/query/sparql";
    // Must stay in sync with CATALOGUE_QUERY in browse.html
    const QUERY = `
PREFIX wdt: <https://hunterhouse.wikibase.cloud/prop/direct/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
PREFIX wikibase: <http://wikiba.se/ontology#>
PREFIX bd: <http://www.bigdata.com/rdf#>
SELECT ?item ?archId ?label ?img ?master
       ?d1 ?d2 ?d3
       ?phase ?phaseLabel ?phase2 ?phase2Label
       ?drawType ?drawTypeLabel
       ?area ?areaLabel
       ?itype ?itypeLabel
       ?src ?srcLabel
       ?creator ?creatorLabel
       ?builtBy ?builtByLabel
       ?designedBy ?designedByLabel
       ?use
       ?builtStatus ?builtStatusLabel
       ?setPos ?notes ?medium
       ?rights ?rightsLabel
       ?heldBy ?heldByLabel
       ?archiveLink ?location
WHERE {
  ?item wdt:P2 ?archId .
  ?item wdt:P96 ?img .
  ?item rdfs:label ?label . FILTER(LANG(?label)="en")
  OPTIONAL { ?item wdt:P95 ?master }
  OPTIONAL { ?item wdt:P82 ?d1 }
  OPTIONAL { ?item wdt:P64 ?d2 }
  OPTIONAL { ?item wdt:P118 ?d3 }
  OPTIONAL { ?item wdt:P62 ?phase . ?phase rdfs:label ?phaseLabel . FILTER(LANG(?phaseLabel)="en") }
  OPTIONAL { ?item wdt:P84 ?phase2 . ?phase2 rdfs:label ?phase2Label . FILTER(LANG(?phase2Label)="en") }
  OPTIONAL { ?item wdt:P88 ?drawType . ?drawType rdfs:label ?drawTypeLabel . FILTER(LANG(?drawTypeLabel)="en") }
  OPTIONAL { ?item wdt:P87 ?area . ?area rdfs:label ?areaLabel . FILTER(LANG(?areaLabel)="en") }
  OPTIONAL { ?item wdt:P1 ?itype . ?itype rdfs:label ?itypeLabel . FILTER(LANG(?itypeLabel)="en") }
  OPTIONAL { ?item wdt:P79 ?src . ?src rdfs:label ?srcLabel . FILTER(LANG(?srcLabel)="en") }
  OPTIONAL { ?item wdt:P80 ?creator . ?creator rdfs:label ?creatorLabel . FILTER(LANG(?creatorLabel)="en") }
  OPTIONAL { ?item wdt:P140 ?builtBy . ?builtBy rdfs:label ?builtByLabel . FILTER(LANG(?builtByLabel)="en") }
  OPTIONAL { ?item wdt:P141 ?designedBy . ?designedBy rdfs:label ?designedByLabel . FILTER(LANG(?designedByLabel)="en") }
  OPTIONAL { ?item wdt:P89 ?use }
  OPTIONAL { ?item wdt:P92 ?builtStatus . ?builtStatus rdfs:label ?builtStatusLabel . FILTER(LANG(?builtStatusLabel)="en") }
  OPTIONAL { ?item wdt:P86 ?setPos }
  OPTIONAL { ?item wdt:P100 ?notes }
  OPTIONAL { ?item wdt:P91 ?medium }
  OPTIONAL { ?item wdt:P93 ?rights . ?rights rdfs:label ?rightsLabel . FILTER(LANG(?rightsLabel)="en") }
  OPTIONAL { ?item wdt:P94 ?heldBy . ?heldBy rdfs:label ?heldByLabel . FILTER(LANG(?heldByLabel)="en") }
  OPTIONAL { ?item wdt:P99 ?archiveLink }
  OPTIONAL { ?item wdt:P142 ?location }
}`;

    fetch(SPARQL, {
      method: "POST",
      headers: { "Content-Type": "application/sparql-query", "Accept": "application/sparql-results+json" },
      body: QUERY
    })
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(data => {
      sessionStorage.setItem("hhf_prefetch", JSON.stringify({
        ts: Date.now(),
        rows: data.results.bindings
      }));
    })
    .catch(() => {});
  })();
</script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/HunterHouse/sw.js');</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hunter House Foundation Archive</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#1a1816">
<meta name="color-scheme" content="dark">
<link rel="manifest" href="/HunterHouse/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HH Archive">
<link rel="apple-touch-icon" href="/HunterHouse/assets/icon-180.png">
<!-- Paint holdout: dark bg before any other style resolves, no white flash. -->
<style>html,body{background:#1a1816;color:#f0ede6}</style>
<!-- Prefetch the page we're going to + its stylesheet so the navigation
     after the fade-out hits the browser cache, not the network. Minimizes
     the white-flash window between index.html unload and browse.html's
     first paint (the inter-page browser default canvas). -->
<link rel="prefetch" href="browse.html" as="document">
<link rel="prefetch" href="assets/verso.css" as="style">
<style>
  /* ── Soft threshold landing ────────────────────────────────────────────
     A typographic-only entry into the archive. No images, no chrome, no
     borders. Type is positioned at the EXACT spatial coordinates the
     equivalent UI element occupies in browse.html — so when the visitor
     clicks through, the typography stays put and the borders/panels/
     images appear AROUND it. Soft reveal, not a jarring jump.

     Spatial map:
       .markid → top-left at 28px / 14px, 11px mono caps 0.18em
                 (identical to browse.html .markid in .site-top)
       .intro  → middle (where image-stage lives), centered horizontally
                 and vertically, .ap-body typography (11.5px mono 1.75)
       .enter  → bottom-right, small mono caps, gentle pulse arrow
   ───────────────────────────────────────────────────────────────────────── */

  :root {
    --bg:    #1a1816;
    --ink:   #f0ede6;
    --muted: #76726a;
    --hint:  #a8a59c;
    --rule:  #2a2723;
    --red:   #c4826e;   /* matches verso.css dark-mode --red */
    --mono:  'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace;
  }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: var(--bg); color: var(--ink);
    font-family: var(--mono);
  }

  /* Full-viewport clickable threshold. */
  .threshold {
    position: fixed; inset: 0;
    cursor: pointer;
    text-decoration: none; color: inherit;
    display: block;
  }

  /* Site mark — identical placement and type to browse.html's .markid.
     Position-preserved on transition: the mark doesn't move, the
     header bar + panels just appear around it. */
  .markid {
    position: absolute;
    left: 28px; top: 14px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
    line-height: 1.4;
    white-space: nowrap;
  }

  /* Wall-text intro — sits in the area the image stage will occupy.
     Uses .ap-body typography (the HHFA pane body font + size + leading).
     The architect's name picks up var(--red) — same Hunter accent as
     the HHFA pane span. */
  .intro {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: min(520px, calc(100% - 80px));
    font-family: var(--mono);
    font-size: 11.5px;
    line-height: 1.75;
    color: var(--ink);
    letter-spacing: 0.02em;
  }
  .intro p { margin: 0 0 14px; }
  .intro .c-red { color: var(--red); }
  .intro .ap-addr { color: var(--muted); margin-top: 6px; }

  /* Enter affordance — bottom-right, quiet mono caps. */
  .enter {
    position: absolute;
    right: 28px; bottom: 18px;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex; align-items: center; gap: 10px;
    transition: color .25s;
  }
  .threshold:hover .enter { color: var(--ink); }
  .enter .arrow { font-size: 11px; letter-spacing: 0; animation: enter-pulse 2.4s ease-in-out 1200ms infinite; }
  @keyframes enter-pulse {
    0%, 100% { transform: translateX(0); }
    50%      { transform: translateX(4px); }
  }

  /* Fade-out on click — short transition before navigation, so the page
     dissolves rather than swaps. The animation finishes at 380ms; the JS
     waits 480ms before calling navigate(), giving 100ms of solid-dark
     body bg between the fade ending and the document unload. Combined
     with the prefetch in <head>, this gives the cached browse.html time
     to start painting before the browser default canvas (white on light-
     mode OS) becomes visible. */
  .threshold.exiting { animation: fade-out 380ms ease-out forwards; pointer-events: none; }
  @keyframes fade-out { to { opacity: 0; } }

  /* Mobile */
  @media (max-width: 767px) {
    .markid { left: 20px; top: 18px; font-size: 11px; }
    .intro { width: calc(100% - 48px); }
    .enter { right: 20px; bottom: 22px; }
  }

  /* Portrait lock — same constraint browse.html honors on phones. */
  #rotate-msg {
    display: none; position: fixed; inset: 0; z-index: 99999;
    background: #000; color: rgba(243,241,236,0.7);
    flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; font-family: var(--mono);
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; pointer-events: none;
  }
  #rotate-msg svg { opacity: 0.45; }
  @media screen and (orientation:landscape) and (max-height:500px) {
    #rotate-msg { display: flex; }
  }
</style>
</head>
<body>
<div id="rotate-msg">
  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
  <span>Rotate to portrait</span>
</div>

<a href="browse.html" class="threshold" id="threshold" aria-label="Enter the Hunter House Foundation Archive">

  <div class="markid">Hunter House Foundation Archive</div>

  <div class="intro">
    <p>A foundation dedicated to the stewardship of the residence and architectural archive of architect <span class="c-red">Richard Morrow Hunter</span> (1930&ndash;2023).</p>
    <p class="ap-addr">203 Goward Road, Saanich, British Columbia.</p>
  </div>

  <div class="enter">
    <span>Enter the archive</span>
    <span class="arrow">→</span>
  </div>

</a>

<script>
  // Click → brief fade → navigate. Sets the hhf_splash flag so browse.html
  // knows the visitor arrived through the threshold (used elsewhere for
  // splash-aware UX decisions).
  const t = document.getElementById('threshold');
  t.addEventListener('click', (e) => {
    e.preventDefault();
    if (t.classList.contains('exiting')) return;
    t.classList.add('exiting');
    sessionStorage.setItem('hhf_splash', '1');
    // 480ms = 380ms fade + 100ms dark hold; gives the prefetched
    // browse.html a beat to start painting before navigation.
    setTimeout(() => { window.location.href = 'browse.html'; }, 480);
  });
</script>

<script>
  // ── SPARQL prefetch ───────────────────────────────────────────────────
  // Invisible. Fires fire-and-forget so browse.html loads instantly from
  // sessionStorage instead of round-tripping to the Wikibase Cloud SPARQL
  // endpoint. Any error is silently swallowed (the splash still navigates;
  // browse.html will just fetch normally).
  //
  // CRITICAL: must stay in sync with CATALOGUE_QUERY in browse.html.
  // When next.html v1.06 promotes, this query needs updating to add
  // ?accessCopy + ?rotation OPTIONALs and to loosen P96 → OPTIONAL with
  // a required P79 (see "Prefetch-sync at promotion" in CLAUDE.md).
  (function () {
    try {
      const existing = sessionStorage.getItem("hhf_prefetch");
      if (existing) {
        const { ts } = JSON.parse(existing);
        if (Date.now() - ts < 300000) return; // fresh prefetch already in place
      }
    } catch {}

    const SPARQL = "https://hunterhouse.wikibase.cloud/query/sparql";
    const QUERY = `
PREFIX wdt: <https://hunterhouse.wikibase.cloud/prop/direct/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
PREFIX wikibase: <http://wikiba.se/ontology#>
PREFIX bd: <http://www.bigdata.com/rdf#>
SELECT ?item ?archId ?label ?img ?master
       ?d1 ?d2 ?d3
       ?phase ?phaseLabel ?phase2 ?phase2Label
       ?drawType ?drawTypeLabel
       ?area ?areaLabel
       ?itype ?itypeLabel
       ?src ?srcLabel
       ?creator ?creatorLabel
       ?builtBy ?builtByLabel
       ?designedBy ?designedByLabel
       ?use
       ?builtStatus ?builtStatusLabel
       ?setPos ?notes ?medium
       ?rights ?rightsLabel
       ?heldBy ?heldByLabel
       ?archiveLink ?location
WHERE {
  ?item wdt:P2 ?archId .
  ?item wdt:P96 ?img .
  ?item rdfs:label ?label . FILTER(LANG(?label)="en")
  OPTIONAL { ?item wdt:P95 ?master }
  OPTIONAL { ?item wdt:P82 ?d1 }
  OPTIONAL { ?item wdt:P64 ?d2 }
  OPTIONAL { ?item wdt:P118 ?d3 }
  OPTIONAL { ?item wdt:P62 ?phase . ?phase rdfs:label ?phaseLabel . FILTER(LANG(?phaseLabel)="en") }
  OPTIONAL { ?item wdt:P84 ?phase2 . ?phase2 rdfs:label ?phase2Label . FILTER(LANG(?phase2Label)="en") }
  OPTIONAL { ?item wdt:P88 ?drawType . ?drawType rdfs:label ?drawTypeLabel . FILTER(LANG(?drawTypeLabel)="en") }
  OPTIONAL { ?item wdt:P87 ?area . ?area rdfs:label ?areaLabel . FILTER(LANG(?areaLabel)="en") }
  OPTIONAL { ?item wdt:P1 ?itype . ?itype rdfs:label ?itypeLabel . FILTER(LANG(?itypeLabel)="en") }
  OPTIONAL { ?item wdt:P79 ?src . ?src rdfs:label ?srcLabel . FILTER(LANG(?srcLabel)="en") }
  OPTIONAL { ?item wdt:P80 ?creator . ?creator rdfs:label ?creatorLabel . FILTER(LANG(?creatorLabel)="en") }
  OPTIONAL { ?item wdt:P140 ?builtBy . ?builtBy rdfs:label ?builtByLabel . FILTER(LANG(?builtByLabel)="en") }
  OPTIONAL { ?item wdt:P141 ?designedBy . ?designedBy rdfs:label ?designedByLabel . FILTER(LANG(?designedByLabel)="en") }
  OPTIONAL { ?item wdt:P89 ?use }
  OPTIONAL { ?item wdt:P92 ?builtStatus . ?builtStatus rdfs:label ?builtStatusLabel . FILTER(LANG(?builtStatusLabel)="en") }
  OPTIONAL { ?item wdt:P86 ?setPos }
  OPTIONAL { ?item wdt:P100 ?notes }
  OPTIONAL { ?item wdt:P91 ?medium }
  OPTIONAL { ?item wdt:P93 ?rights . ?rights rdfs:label ?rightsLabel . FILTER(LANG(?rightsLabel)="en") }
  OPTIONAL { ?item wdt:P94 ?heldBy . ?heldBy rdfs:label ?heldByLabel . FILTER(LANG(?heldByLabel)="en") }
  OPTIONAL { ?item wdt:P99 ?archiveLink }
  OPTIONAL { ?item wdt:P142 ?location }
}`;

    fetch(SPARQL, {
      method: "POST",
      headers: { "Content-Type": "application/sparql-query", "Accept": "application/sparql-results+json" },
      body: QUERY
    })
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(data => {
      sessionStorage.setItem("hhf_prefetch", JSON.stringify({
        ts: Date.now(),
        rows: data.results.bindings
      }));
    })
    .catch(() => {});
  })();
</script>

<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/HunterHouse/sw.js');</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hunter House Foundation</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#1a1816;color:#f3f1ec;font-family:'SF Mono','JetBrains Mono',ui-monospace,Menlo,monospace}

  .splash{
    position:fixed;inset:0;cursor:pointer;
    display:flex;flex-direction:column;
    text-decoration:none;color:inherit;
  }

  .film{
    position:absolute;inset:0;overflow:hidden;
    background:
      radial-gradient(ellipse 70% 90% at 35% 45%, #2a2520 0%, transparent 60%),
      radial-gradient(ellipse 80% 70% at 70% 60%, #1f1b16 0%, transparent 65%),
      #1a1816;
  }
  .film video{opacity:0;transition:opacity 700ms ease-out;position:absolute;top:50%;left:50%;width:max(100vw,calc(100vh*16/9));height:max(100vh,calc(100vw*9/16));transform:translate(-50%,-50%);object-fit:cover}
  .film.ready video{opacity:1}

  .splash .mark{
    position:absolute;left:50%;top:50%;
    transform:translate(-50%,-50%);
    font-family:'SF Mono','JetBrains Mono',ui-monospace,Menlo,monospace;font-size:30px;font-weight:500;
    letter-spacing:0.10em;text-transform:uppercase;
    color:#f3f1ec;white-space:nowrap;text-align:center;line-height:1.5;
    text-shadow:0 1px 28px rgba(0,0,0,0.7);
    z-index:5;pointer-events:none;
    opacity:0;animation:mark-in 1400ms cubic-bezier(.2,.7,.2,1) 300ms forwards;
    view-transition-name:hh-mark;
  }
  .splash .mark .dim{font-size:21px;font-weight:400;letter-spacing:0.16em;color:rgba(243,241,236,0.5)}
  @keyframes mark-in{
    from{opacity:0;transform:translate(-50%,-46%)}
    to  {opacity:1;transform:translate(-50%,-50%)}
  }

  .splash.exiting{pointer-events:none;cursor:default}
  .splash.exiting .film{transition:opacity 800ms cubic-bezier(.4,0,.2,1);opacity:0}
  /* Single paper overlay covers the full screen — no dark body flash */
  .splash.exiting::after{
    content:"";position:absolute;inset:0;
    background:#f3f1ec;
    opacity:0;animation:paper-in 700ms cubic-bezier(.4,0,.2,1) 150ms forwards;
    z-index:2;
  }
  @keyframes paper-in{to{opacity:1}}
  .splash.exiting .imprint,
  .splash.exiting .enter{transition:opacity 250ms ease-out;opacity:0}
.splash.exiting .mark{
    animation:mark-exit 900ms cubic-bezier(.4,0,.2,1) forwards;
    z-index:10;
  }
  @keyframes mark-exit{
    from{transform:translate(-50%,-50%);color:#f3f1ec;text-shadow:0 1px 28px rgba(0,0,0,0.7)}
    to  {transform:translate(calc(28px - 50vw), calc(22px - 50vh)) scale(0.36);color:#1e1c1a;text-shadow:none}
  }

  .splash .enter{
    position:absolute;right:36px;bottom:32px;z-index:5;
    font-family:'SF Mono','JetBrains Mono',ui-monospace,Menlo,monospace;font-size:13px;color:rgba(243,241,236,0.7);
    letter-spacing:0.28em;text-transform:uppercase;
    display:flex;align-items:center;gap:14px;
    text-shadow:0 1px 8px rgba(0,0,0,0.6);
    pointer-events:none;
    opacity:0;animation:fade-in 700ms ease-out 2200ms forwards;
  }
  .splash .enter .arrow{color:#e4a47e;font-size:13px;letter-spacing:0;animation:enter-pulse 2.4s ease-in-out 3000ms infinite}
  @keyframes fade-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes enter-pulse{0%,100%{transform:translateX(0)}50%{transform:translateX(4px)}}

  .splash .imprint{
    position:absolute;left:36px;top:28px;z-index:5;
    font-family:'SF Mono','JetBrains Mono',ui-monospace,Menlo,monospace;font-size:10.5px;color:rgba(243,241,236,0.45);
    letter-spacing:0.18em;text-transform:uppercase;
    pointer-events:none;
    opacity:0;animation:fade-in 700ms ease-out 2400ms forwards;
  }
  .splash .imprint b{color:rgba(243,241,236,0.85);font-weight:500;margin-right:8px}

  .splash:hover .enter{color:#f3f1ec}
  .splash:active{transform:scale(0.998)}

  @media (max-width:767px){
    .splash .mark{font-size:20px}
    .splash .mark .dim{font-size:14px}
    .splash .enter{right:20px;bottom:24px}
    .splash .imprint{left:20px}
  }
</style>
</head>
<body>

<a href="browse.html" class="splash" id="splash" aria-label="Enter the Hunter House Foundation archive">
  <div class="film" id="film">
    <video id="film-video" autoplay loop muted playsinline preload="auto"></video>
  </div>
  <div class="imprint"><b>2026.05</b>v1.0.1</div>
  <div class="mark">
    <span class="name">Hunter House <span class="dim">Foundation</span></span>
  </div>
  <div class="enter"><span>Enter to Archive</span><span class="arrow">→</span></div>
</a>

<script>
  const splash = document.getElementById('splash');
  const film   = document.getElementById('film');
  const video  = document.getElementById('film-video');

  // Default to 1080p; only serve 4K when a fast connection is confirmed
  const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  const fast = conn && !conn.saveData && conn.effectiveType === '4g' && (conn.downlink || 10) >= 5;
  const R2 = 'https://archive.hunterhousefoundation.com/web/media';
  video.src = fast ? `${R2}/HH-Splash4k.mp4` : `${R2}/HH-Splash1080.mp4`;

  // Show video on first decoded frame; 500ms fallback so background
  // appears quickly even on slow connections (dark bg already visible).
  const showFilm = () => film.classList.add('ready');
  const fallback = setTimeout(showFilm, 500);
  video.addEventListener('loadeddata', () => { clearTimeout(fallback); showFilm(); }, { once: true });

  // Click → animate out → navigate to browse
  splash.addEventListener('click', (e) => {
    e.preventDefault();
    if (splash.classList.contains('exiting')) return;
    splash.classList.add('exiting');
    setTimeout(() => { window.location.href = 'browse.html'; }, 870);
  });
</script>
</body>
</html>

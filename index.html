<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hunter House Foundation</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@200;300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/verso.css">
<link rel="prefetch" href="browse.html">
<link rel="prefetch" href="assets/verso.css">
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#1a1816;color:#f3f1ec;font-family:var(--sans)}

  @view-transition{navigation:auto}
  ::view-transition-old(root),
  ::view-transition-new(root){animation-duration:700ms;animation-timing-function:cubic-bezier(.4,0,.2,1)}
  ::view-transition-group(hh-mark){animation-duration:900ms;animation-timing-function:cubic-bezier(.4,0,.2,1)}

  .splash{
    position:fixed;inset:0;cursor:pointer;
    display:flex;flex-direction:column;
    text-decoration:none;color:inherit;
  }

  .film{
    position:absolute;inset:0;overflow:hidden;
    background:
      radial-gradient(ellipse 70% 90% at 35% 45%, #2a2520 0%, transparent 60%),
      radial-gradient(ellipse 80% 70% at 70% 60%, #1f1b16 0%, transparent 65%),
      #1a1816;
  }
  .film video{opacity:0;transition:opacity 700ms ease-out;position:absolute;top:50%;left:50%;width:max(100vw,calc(100vh*16/9));height:max(100vh,calc(100vw*9/16));transform:translate(-50%,-50%);object-fit:cover}
  .film.ready video{opacity:1}

  .splash .mark{
    position:absolute;left:50%;top:50%;
    transform:translate(-50%,-50%);
    font-size:56px;font-weight:300;letter-spacing:-0.022em;color:#f3f1ec;
    white-space:nowrap;text-align:center;line-height:1.15;
    text-shadow:0 1px 32px rgba(0,0,0,0.55);
    z-index:5;pointer-events:none;
    opacity:0;animation:mark-in 1400ms cubic-bezier(.2,.7,.2,1) 300ms forwards;
    view-transition-name:hh-mark;
  }
  .splash .mark .dim{color:rgba(243,241,236,0.55);font-weight:300}
  .splash .mark .place{
    display:block;margin-top:18px;
    font-family:var(--mono);font-size:11px;color:rgba(243,241,236,0.65);
    letter-spacing:0.28em;text-transform:uppercase;font-weight:500;
    text-shadow:0 1px 12px rgba(0,0,0,0.7);
  }
  @keyframes mark-in{
    from{opacity:0;transform:translate(-50%,-46%)}
    to  {opacity:1;transform:translate(-50%,-50%)}
  }

  /* Loading state — logo replaces title, background iframe warms the cache */
  .splash .logo-load{
    position:absolute;left:50%;top:50%;
    transform:translate(-50%,-50%);
    z-index:20;pointer-events:none;
    opacity:0;transition:opacity 500ms ease;
  }
  .splash .logo-load img{width:80px;height:auto;display:block}
  .splash.loading .logo-load{opacity:1}
  .splash.loading .logo-load img{animation:logo-pulse 2.2s ease-in-out 500ms infinite}
  @keyframes logo-pulse{0%,100%{opacity:0.45}50%{opacity:1}}
  .splash.loading .mark{opacity:0;transition:opacity 350ms ease}
  .splash.loading .enter{opacity:0;transition:opacity 250ms ease}
  .splash.loading .imprint{opacity:0;transition:opacity 250ms ease}
  .splash.loading .film{opacity:0;transition:opacity 700ms ease}

  .splash .enter{
    position:absolute;right:36px;bottom:32px;z-index:5;
    font-family:var(--mono);font-size:13px;color:rgba(243,241,236,0.7);
    letter-spacing:0.28em;text-transform:uppercase;
    display:flex;align-items:center;gap:14px;
    text-shadow:0 1px 8px rgba(0,0,0,0.6);
    pointer-events:none;
    opacity:0;animation:fade-in 700ms ease-out 2200ms forwards;
  }
  .splash .enter .arrow{color:#e4a47e;font-size:13px;letter-spacing:0;animation:enter-pulse 2.4s ease-in-out 3000ms infinite}
  @keyframes fade-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes enter-pulse{0%,100%{transform:translateX(0)}50%{transform:translateX(4px)}}

  .splash .imprint{
    position:absolute;left:36px;top:28px;z-index:5;
    font-family:var(--mono);font-size:10.5px;color:rgba(243,241,236,0.45);
    letter-spacing:0.18em;text-transform:uppercase;
    pointer-events:none;
    opacity:0;animation:fade-in 700ms ease-out 2400ms forwards;
  }
  .splash .imprint b{color:rgba(243,241,236,0.85);font-weight:500;margin-right:8px}

  .splash:hover .enter{color:#f3f1ec}
  .splash:active{transform:scale(0.998)}

  @media (max-width:767px){
    .splash .mark{font-size:34px}
    .splash .enter{right:20px;bottom:24px}
    .splash .imprint{left:20px}
  }
</style>
</head>
<body>

<a href="browse.html" class="splash" id="splash" aria-label="Enter the Hunter House Foundation archive">
  <div class="film" id="film">
    <video id="film-video" autoplay loop muted playsinline preload="auto"></video>
  </div>
  <div class="logo-load" id="logo-load"><img src="assets/hunter-mark.png" alt=""></div>
  <div class="imprint"><b>2026.05</b>v1.0</div>
  <div class="mark">
    Hunter House <span class="dim">Foundation</span>
    <span class="place">Victoria, British Columbia</span>
  </div>
  <div class="enter"><span>Enter to Archive</span><span class="arrow">→</span></div>
</a>

<script>
  const splash = document.getElementById('splash');
  const film   = document.getElementById('film');
  const video  = document.getElementById('film-video');

  // Default to 1080p; only serve 4K when a fast connection is confirmed
  const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  const fast = conn && !conn.saveData && conn.effectiveType === '4g' && (conn.downlink || 10) >= 5;
  video.src = fast ? 'assets/HH-Splash4k.mp4' : 'assets/HH-Splash1080.mp4';

  // Show video once it can play, 2s fallback for slow connections
  const showFilm = () => film.classList.add('ready');
  const fallback = setTimeout(showFilm, 2000);
  video.addEventListener('canplay', () => { clearTimeout(fallback); showFilm(); }, { once: true });

  // Click → show logo, load browse.html in background iframe to warm localStorage cache,
  // then navigate once data is ready (or after 15s timeout fallback).
  // Minimum 1.4s display so the logo doesn't just flash on cache-hit.
  splash.addEventListener('click', (e) => {
    e.preventDefault();
    if (splash.classList.contains('loading')) return;
    splash.classList.add('loading');

    const frame = document.createElement('iframe');
    frame.src = 'browse.html';
    frame.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;z-index:-1';
    document.body.appendChild(frame);

    const minWait   = new Promise(r => setTimeout(r, 1400));
    const dataReady = new Promise(r => {
      window.addEventListener('message', e => { if (e.data === 'hh-ready') r(); }, { once: true });
    });
    const timeout = new Promise(r => setTimeout(r, 15000));

    Promise.all([minWait, Promise.race([dataReady, timeout])])
      .then(() => { window.location.href = 'browse.html'; });
  });
</script>
</body>
</html>

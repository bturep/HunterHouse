<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<title>Hunter House Foundation Archive</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#1a1816">
<!-- PWA hookups kept here so installs originating at /HunterHouse/ still
     wire up to the manifest. start_url in the manifest still points at
     browse.html, so the installed PWA opens straight into the archive. -->
<link rel="manifest" href="/HunterHouse/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HH Archive">
<link rel="apple-touch-icon" href="/HunterHouse/assets/icon-180.png">
<!-- Dark canvas before any other style resolves; the visitor never sees
     white between landing here and browse.html's first paint. -->
<style>html,body{background:#1a1816;margin:0;height:100%}</style>
<link rel="canonical" href="browse.html">
<!-- Immediate JS redirect (preserves any URL hash); meta-refresh is the
     no-JS fallback. browse.html now acts as its own opener: on load it
     collapses both panels and opens the HHFA about-pane as a soft splash. -->
<script>window.location.replace('browse.html' + window.location.hash);</script>
<meta http-equiv="refresh" content="0; url=browse.html">
</head>
<body></body>
</html>

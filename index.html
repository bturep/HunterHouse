<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hunter House Foundation</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@200;300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/verso.css">
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0f0d0a;color:#f3f1ec;font-family:var(--sans)}

  /* opt this page into cross-document view transitions — the browser will
     morph matched elements (markid) between this page and the next. */
  @view-transition{navigation:auto}
  ::view-transition-old(root),
  ::view-transition-new(root){animation-duration:700ms;animation-timing-function:cubic-bezier(.4,0,.2,1)}
  ::view-transition-group(hh-mark){animation-duration:900ms;animation-timing-function:cubic-bezier(.4,0,.2,1)}

  .splash{
    position:fixed;inset:0;cursor:pointer;
    display:flex;flex-direction:column;
    text-decoration:none;color:inherit;
  }

  /* ── film ─────────────────────────────────────────────────── */
  .film{
    position:absolute;inset:0;overflow:hidden;
    background:
      radial-gradient(ellipse 70% 90% at 35% 45%, #2a2520 0%, transparent 60%),
      radial-gradient(ellipse 80% 70% at 70% 60%, #1f1b16 0%, transparent 65%),
      #0f0d0a;
  }
  .film iframe{opacity:0;transition:opacity 700ms ease-out}
  .film.ready iframe{opacity:1}

  /* ── markid (centred, large, leads) ──────────────────────── */
  .splash .mark{
    position:absolute;left:50%;top:50%;
    transform:translate(-50%,-50%) scale(1);
    transform-origin:0 0;
    font-size:56px;font-weight:300;letter-spacing:-0.022em;color:#f3f1ec;
    white-space:nowrap;text-align:center;line-height:1.15;
    text-shadow:0 1px 32px rgba(0,0,0,0.55);
    z-index:5;pointer-events:none;
    opacity:0;animation:mark-in 1400ms cubic-bezier(.2,.7,.2,1) 300ms forwards;
    view-transition-name:hh-mark;
  }
  .splash .mark .dim{color:rgba(243,241,236,0.55);font-weight:300}
  .splash .mark .place{
    display:block;margin-top:18px;
    font-family:var(--mono);font-size:11px;color:rgba(243,241,236,0.65);
    letter-spacing:0.28em;text-transform:uppercase;font-weight:500;
    text-shadow:0 1px 12px rgba(0,0,0,0.7);
  }
  @keyframes mark-in{
    from{opacity:0;transform:translate(-50%,-46%) scale(1)}
    to  {opacity:1;transform:translate(-50%,-50%) scale(1)}
  }

  /* ── exit (JS-driven, works in every browser) ────────────── */
  .splash.exiting{pointer-events:none;cursor:default}
  .splash.exiting .film{transition:opacity 700ms cubic-bezier(.4,0,.2,1);opacity:0}
  .splash.exiting::before{
    content:"";position:absolute;top:0;left:0;right:0;height:60px;
    background:#f3f1ec;border-bottom:1px solid #1e1c1a;
    opacity:0;animation:bar-in 600ms cubic-bezier(.4,0,.2,1) 250ms forwards;
    z-index:3;
  }
  .splash.exiting::after{
    content:"";position:absolute;top:60px;left:0;right:0;bottom:0;
    background:#1e1c1a;
    opacity:0;animation:bar-in 700ms cubic-bezier(.4,0,.2,1) 200ms forwards;
    z-index:2;
  }
  @keyframes bar-in{to{opacity:1}}
  .splash.exiting .imprint,
  .splash.exiting .enter{transition:opacity 300ms ease-out;opacity:0}
  .splash.exiting .mark .place{transition:opacity 250ms ease-out;opacity:0}
  .splash.exiting .mark{
    animation:mark-exit 900ms cubic-bezier(.4,0,.2,1) forwards;
    z-index:10;
  }
  @keyframes mark-exit{
    from{
      transform:translate(-50%,-50%) scale(1);
      color:#f3f1ec;
      text-shadow:0 1px 32px rgba(0,0,0,0.55);
    }
    to{
      transform:translate(calc(28px - 50vw), calc(22px - 50vh)) scale(0.24);
      color:#1e1c1a;
      text-shadow:none;
    }
  }

  /* ── enter cue ───────────────────────────────────────────── */
  .splash .enter{
    position:absolute;right:36px;bottom:32px;z-index:5;
    font-family:var(--mono);font-size:11px;color:rgba(243,241,236,0.7);
    letter-spacing:0.32em;text-transform:uppercase;
    display:flex;align-items:center;gap:14px;
    text-shadow:0 1px 8px rgba(0,0,0,0.6);
    pointer-events:none;
    opacity:0;animation:enter-in 700ms ease-out 2200ms forwards;
  }
  .splash .enter .arrow{color:#e4a47e;font-size:13px;letter-spacing:0;animation:enter-pulse 2.4s ease-in-out 3000ms infinite}
  @keyframes enter-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes enter-pulse{
    0%,100%{transform:translateX(0)}
    50%{transform:translateX(4px)}
  }

  /* ── version / corner mark (subtle imprint) ─────────────── */
  .splash .imprint{
    position:absolute;left:36px;top:28px;z-index:5;
    font-family:var(--mono);font-size:10.5px;color:rgba(243,241,236,0.45);
    letter-spacing:0.18em;text-transform:uppercase;
    pointer-events:none;
    opacity:0;animation:fade-in 700ms ease-out 2400ms forwards;
  }
  .splash .imprint b{color:rgba(243,241,236,0.85);font-weight:500;margin-right:8px}
  @keyframes fade-in{from{opacity:0}to{opacity:1}}

  /* hover/click feedback */
  .splash:hover .enter{color:#f3f1ec}
  .splash:hover .enter .arrow{color:#e4a47e}
  .splash:active{transform:scale(0.998)}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
  const { useRef, useState, useEffect } = React;

  function Film() {
    const ref = useRef(null);
    const [ready, setReady] = useState(false);

    useEffect(() => {
      const onMsg = (e) => {
        if (typeof e.data !== 'string' || !e.origin.includes('vimeo.com')) return;
        try {
          const data = JSON.parse(e.data);
          if (data.event === 'play' || data.event === 'playing') setReady(true);
        } catch {}
      };
      window.addEventListener('message', onMsg);
      const fallback = setTimeout(() => setReady(true), 2000);
      return () => { window.removeEventListener('message', onMsg); clearTimeout(fallback); };
    }, []);

    const onLoad = () => {
      try {
        ref.current?.contentWindow?.postMessage(
          JSON.stringify({ method: 'addEventListener', value: 'play' }),
          'https://player.vimeo.com'
        );
      } catch {}
    };

    return (
      <div className={"film" + (ready ? " ready" : "")}>
        <iframe
          ref={ref}
          src="https://player.vimeo.com/video/1184581518?h=55333bb0b2&autoplay=1&loop=1&muted=1&background=1&dnt=1&api=1#t=440s"
          frameBorder="0"
          allow="autoplay; fullscreen; picture-in-picture"
          title="Hunter House"
          loading="eager"
          onLoad={onLoad}
          style={{
            position:'absolute', top:'50%', left:'50%',
            width:'max(100vw, 100vh * 16 / 9)',
            height:'max(100vh, 100vw * 9 / 16)',
            transform:'translate(-50%, -50%)',
            border:0, pointerEvents:'none',
          }}
        />
      </div>
    );
  }

  function Splash() {
    const [exiting, setExiting] = useState(false);
    const go = (e) => {
      e.preventDefault();
      if (exiting) return;
      setExiting(true);
      setTimeout(() => { window.location.href = 'archive.html'; }, 870);
    };
    return (
      <a href="archive.html" onClick={go} className={"splash" + (exiting ? ' exiting' : '')} aria-label="Enter the Hunter House Foundation site">
        <Film />
        <div className="imprint"><b>2026</b>v0.5</div>
        <div className="mark">
          Hunter House <span className="dim">Foundation</span>
          <span className="place">Victoria, British Columbia</span>
        </div>
        <div className="enter">
          <span>Enter</span><span className="arrow">→</span>
        </div>
      </a>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Splash />);
</script>
</body>
</html>

name = "hhf-r2-browser"
main = "src/worker.js"
compatibility_date = "2026-05-01"

# Deployed in Brandon's own Cloudflare account (has Workers rights). The bucket
# lives in the Foundation account, reached cross-account over the R2 S3 API —
# see src/worker.js. No native R2 binding (those are same-account only).
account_id = "628a738b1d9d965f53070f1729bcf596"

# Non-secret config. R2_ACCOUNT_ID is the Foundation account that owns the
# bucket (its R2 S3 endpoint is <id>.r2.cloudflarestorage.com).
[vars]
R2_ACCOUNT_ID = "3f5df2ae1dd448bc55f9009a92e91f12"
R2_BUCKET = "hunter-house-archive"

# Secrets (NOT stored here) — set once after deploy with a READ-ONLY R2 token:
#   npx wrangler secret put R2_ACCESS_KEY_ID
#   npx wrangler secret put R2_SECRET_ACCESS_KEY

# Workers Logs — structured console.log lines from /dl and /event are queryable
# in the dashboard (Workers & Pages → this Worker → Logs) and `wrangler tail`.
[observability]
enabled = true

# Cookieless usage analytics sink. Each /dl and /event hit writes one data point
# (column map in src/worker.js). Query later via the Analytics Engine SQL API.
# Writes are best-effort: with this binding absent the endpoints still function
# (they just record to Workers Logs only), so the site never breaks on it.
#
# Analytics Engine enabled on the account 2026-06-06; dataset created in the
# dashboard as "Hunter_House_Archive". The binding name MUST stay "AE" — the
# Worker reads env.AE (src/worker.js). The dataset name is arbitrary and just
# needs to match the dashboard dataset.
[[analytics_engine_datasets]]
binding = "AE"
dataset = "Hunter_House_Archive"

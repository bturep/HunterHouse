<!DOCTYPE html>
<!-- entry-test2 v0.08 — the convergence entry (Brandon, 2026-07-19):
     open on big blocky HUNTER HOUSE. Scroll: both words slide toward the EXACT
     midline and are clipped INTO it — each swallowed by the centre as it
     crosses. No dot. Then the 1970 elevation drawing rises from the middle —
     always fully dark (no fade), arriving out of the point the text vanished into.
     Reversible. noindex + unlinked (mock). -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hunter House — Entry 2 (test)</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@200;300;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{background:#f6f5f5;font-family:"Inter Tight",system-ui,sans-serif;color:#1b1918}
  /* the words — each clipped at the exact midline; they disappear INTO it */
  #stage{position:fixed;inset:0}
  #words{position:absolute;inset:0;font-weight:800;font-size:clamp(56px,9vw,140px);
    letter-spacing:-.02em;white-space:nowrap}
  .clip{position:absolute;top:0;bottom:0;width:50%;overflow:hidden;display:flex;align-items:center}
  .clip-l{left:0;justify-content:flex-end}
  .clip-r{right:0;justify-content:flex-start}
  #w-hunter{display:inline-block;will-change:transform;margin-right:.17em}
  #w-house{display:inline-block;will-change:transform;margin-left:.17em}
  /* the drawing — always dark, no fade; enters at the type's height, rises */
  #draw{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    visibility:hidden;transform-origin:50% 50%;z-index:4;pointer-events:none}
  #draw img{width:min(1100px,90vw);display:block}
</style>
</head>
<body>
<div id="stage">
  <div id="words" aria-label="Hunter House">
    <div class="clip clip-l"><span id="w-hunter">HUNTER</span></div>
    <div class="clip clip-r"><span id="w-house">HOUSE</span></div>
  </div>
  <div id="draw"><img id="draw-img" src="assets/entry/letter-elev-grey.png" alt="The house sketched in Ric's 1970 letter"></div>
</div>

<script>
// entry-test2 v0.08 — scroll drives z: 0..1 convergence · 1..2 the drawing arises.
(function () {
  var z = 0, target = 0;
  var hunter = document.getElementById("w-hunter");
  var house = document.getElementById("w-house");
  var draw = document.getElementById("draw");
  var drawImg = document.getElementById("draw-img");

  // each word travels its own width + its midline margin — fully INTO the line
  function travel() {
    var m = parseFloat(getComputedStyle(hunter).marginRight) || 0;
    return {
      hunter: hunter.getBoundingClientRect().width + m,
      house: house.getBoundingClientRect().width + m
    };
  }
  // the drawing arrives out of the single abstract point the text vanished
  // into — scale from ~nothing, never opacity
  var S0 = 0.003;
  var ease = function (t) { return t < .5 ? 2*t*t : 1 - Math.pow(-2*t + 2, 2) / 2; };

  function apply() {
    var zA = Math.min(1, z);              // convergence into the midline
    var zB = Math.max(0, Math.min(1, z - 1));   // the drawing's rise
    var tv = travel();
    var e = ease(zA);
    hunter.style.transform = "translateX(" + (e * tv.hunter) + "px)";
    house.style.transform = "translateX(" + (-e * tv.house) + "px)";
    // the drawing: no fade — always dark; present once the words are gone,
    // entering at the type's height and rising to full
    if (zB > 0) {
      draw.style.visibility = "visible";
      draw.style.transform = "scale(" + (S0 + ease(zB) * (1 - S0)) + ")";
    } else {
      draw.style.visibility = "hidden";
    }
  }

  // wheel / touch / keys drive z (reversible)
  var raf = null;
  function step() {
    raf = null;
    z += (target - z) * 0.16;
    if (Math.abs(target - z) > 0.001) raf = requestAnimationFrame(step);
    else z = target;
    apply();
  }
  function nudge(d) {
    target = Math.max(0, Math.min(2, target + d));
    if (!raf) raf = requestAnimationFrame(step);
  }
  window.addEventListener("wheel", function (e) { e.preventDefault(); nudge(e.deltaY / 900); }, { passive: false });
  var ty = null;
  window.addEventListener("touchstart", function (e) { ty = e.touches[0].clientY; }, { passive: true });
  window.addEventListener("touchmove", function (e) {
    if (ty !== null) { nudge((ty - e.touches[0].clientY) / 300); ty = e.touches[0].clientY; }
  }, { passive: true });
  window.addEventListener("keydown", function (e) {
    if (e.key === "ArrowDown" || e.key === "PageDown" || e.key === " ") { e.preventDefault(); nudge(0.5); }
    if (e.key === "ArrowUp" || e.key === "PageUp") { e.preventDefault(); nudge(-0.5); }
  });
  window.addEventListener("resize", apply);
  apply();
  console.log("entry-test2 v0.08");
})();
</script>
</body>
</html>

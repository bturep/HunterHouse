<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Browse — Hunter House Archive</title>
<meta name="viewport" content="width=1400">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/verso.css">
<style>
  html,body{height:100%;overflow:hidden}

  /* ── controls bar ── */
  .controls{
    display:flex;align-items:stretch;gap:0;
    padding:0 36px;border-bottom:1px solid var(--ink);background:var(--bg);
  }
  .search{
    flex:1;display:flex;align-items:center;gap:10px;
    padding:10px 24px 10px 0;border-right:1px solid var(--rule);margin-right:24px;
  }
  .search .sym{font-family:var(--mono);font-size:13px;color:var(--muted)}
  .search input{
    font:inherit;font-size:14px;background:none;border:0;outline:0;
    color:var(--ink);width:100%;letter-spacing:-0.005em;
  }
  .search input::placeholder{color:var(--hint)}
  .search kbd{font-family:var(--mono);font-size:10px;color:var(--muted);border:1px solid var(--rule);padding:1px 5px;background:var(--bg)}
  .fbtn{
    display:flex;flex-direction:column;justify-content:center;gap:2px;
    padding:0 18px;border-right:1px solid var(--rule);cursor:pointer;user-select:none;
  }
  .fbtn .lbl{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.16em;text-transform:uppercase;white-space:nowrap}
  .fbtn .val{font-size:12px;color:var(--ink);white-space:nowrap}
  .fbtn .val .car{font-family:var(--mono);font-size:9px;color:var(--hint);margin-left:6px}
  .fbtn:hover{background:var(--soft)}
  .fbtn.active{background:var(--ink)}
  .fbtn.active .lbl{color:rgba(250,246,232,0.6)}
  .fbtn.active .val{color:var(--bg)}
  .fbtn.active .val .car{color:rgba(250,246,232,0.6)}
  .fbtn.active:hover{background:var(--ink)}
  .ctrl-count{
    display:flex;align-items:center;padding:0 18px;
    font-family:var(--mono);font-size:11px;color:var(--muted);
    letter-spacing:0.04em;font-variant-numeric:tabular-nums;white-space:nowrap;
  }
  .ctrl-count b{color:var(--ink);font-weight:500;margin-right:4px}

  /* ── shell ── */
  .shell{
    display:grid;grid-template-columns:minmax(560px,640px) 1fr;
    height:calc(100vh - 100px);min-height:560px;
  }
  .pane-list{border-right:1px solid var(--ink);display:flex;flex-direction:column;min-width:0;overflow:hidden}
  .pane-preview{background:var(--bg);padding:32px 40px;overflow-y:auto;min-width:0;position:relative}

  /* ── row head ── */
  .rowhead{
    display:grid;grid-template-columns:36px 96px 1fr 80px 56px;gap:14px;
    padding:9px 24px;
    font-family:var(--mono);font-size:9.5px;color:var(--muted);
    letter-spacing:0.18em;text-transform:uppercase;
    border-bottom:1px solid var(--ink);flex-shrink:0;
  }
  .rowhead .r{text-align:right}

  .rows{flex:1;overflow-y:auto}

  /* ── rows ── */
  .row{
    display:grid;grid-template-columns:36px 96px 1fr 80px 56px;gap:14px;
    padding:11px 24px;align-items:baseline;cursor:pointer;
    border-bottom:1px dashed var(--rule);position:relative;
  }
  .row .ix{font-family:var(--mono);font-size:10.5px;color:var(--hint);letter-spacing:0;font-variant-numeric:tabular-nums;white-space:nowrap}
  .row .archid{font-family:var(--mono);font-size:12px;color:var(--ink);letter-spacing:0.02em;font-weight:500;white-space:nowrap}
  .row .title{font-size:13.5px;letter-spacing:-0.005em;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .row .title .ph{font-family:var(--mono);font-size:10.5px;color:var(--copper-deep);margin-left:12px;letter-spacing:0.02em;white-space:nowrap}
  .row .year{font-family:var(--mono);font-size:11.5px;color:var(--muted);text-align:right;font-variant-numeric:tabular-nums;letter-spacing:0;white-space:nowrap}
  .row .ty{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:right;letter-spacing:0.08em;text-transform:uppercase;white-space:nowrap}
  .row:hover{background:var(--soft)}
  .row.sel{background:var(--ink)}
  .row.sel .ix,.row.sel .archid,.row.sel .title,.row.sel .year,.row.sel .ty{color:var(--bg)}
  .row.sel .title .ph{color:#a3c4b6}
  .row.sel .ix{color:#e36a4f}
  .row.sel::before{
    content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);
    width:6px;height:6px;border-radius:50%;background:#e36a4f;
    box-shadow:0 0 0 2px var(--ink);
  }

  /* ── phase divider ── */
  .phase-divider{
    display:grid;grid-template-columns:1fr auto;gap:14px;
    padding:18px 24px 8px;border-bottom:1px solid var(--ink);
    font-family:var(--mono);font-size:10px;color:var(--copper-deep);
    letter-spacing:0.18em;text-transform:uppercase;background:var(--bg);
  }
  .phase-divider .r{color:var(--muted);white-space:nowrap}

  /* ── preview pane ── */
  .preview-head{
    display:grid;grid-template-columns:1fr auto;align-items:end;
    padding-bottom:14px;border-bottom:1px solid var(--ink);margin-bottom:24px;
  }
  .archid-big{font-family:var(--mono);font-size:24px;color:var(--ink);font-weight:500;letter-spacing:0.02em;white-space:nowrap}
  .archid-big .br{color:var(--red)}
  .preview-sub{font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:0.18em;text-transform:uppercase;margin-top:8px;white-space:nowrap}
  .preview-nav{display:flex;gap:14px;font-family:var(--mono);font-size:11px}
  .preview-nav a{color:var(--muted);text-decoration:none;white-space:nowrap}
  .preview-nav a:hover{color:var(--ink)}

  .plate{
    background:#fff;border:1px solid var(--ink);position:relative;overflow:hidden;
    aspect-ratio:3/2;margin-bottom:14px;
    display:flex;align-items:center;justify-content:center;
  }
  .plate img{width:100%;height:100%;object-fit:contain;display:block}
  .plate-placeholder{font-family:var(--mono);font-size:10px;color:var(--hint);letter-spacing:0.12em;text-transform:uppercase}

  .plate-caption{
    display:grid;grid-template-columns:auto 1fr auto;gap:20px;
    padding:10px 0;margin-bottom:28px;
    font-family:var(--mono);font-size:10px;color:var(--muted);
    letter-spacing:0.12em;text-transform:uppercase;
    border-bottom:1px dotted var(--rule);
  }
  .plate-caption .l{color:var(--ink);font-weight:500;white-space:nowrap}
  .plate-caption .m{text-align:center;letter-spacing:0.04em}
  .plate-caption span:last-child{white-space:nowrap}

  .pv-title{font-size:28px;font-weight:500;color:var(--ink);letter-spacing:-0.02em;line-height:1.12;margin-bottom:8px;max-width:600px}
  .pv-orig{
    font-family:var(--mono);font-size:10.5px;color:var(--muted);
    letter-spacing:0.06em;margin-bottom:24px;text-transform:uppercase;
    display:flex;gap:12px;align-items:baseline;
  }
  .pv-orig .lb{color:var(--hint);letter-spacing:0.2em;white-space:nowrap}
  .pv-orig .vl{color:var(--ink)}

  .pv-lede{
    font-family:var(--sans);font-size:15px;line-height:1.55;color:var(--ink);
    max-width:540px;margin-bottom:26px;letter-spacing:-0.005em;font-weight:300;
  }

  .pv-meta{
    display:grid;grid-template-columns:96px 1fr;gap:9px 24px;
    padding-top:18px;border-top:1px solid var(--rule);max-width:560px;
  }
  .pv-meta dt{font-family:var(--mono);font-size:9.5px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;padding-top:3px;white-space:nowrap}
  .pv-meta dd{font-size:13px;color:var(--ink);letter-spacing:-0.005em}
  .pv-meta dd a{color:var(--copper-deep);text-decoration:none;border-bottom:1px solid var(--copper-pale)}
  .pill{display:inline-flex;align-items:center;height:19px;padding:0 8px;background:var(--copper-pale);color:var(--copper-deep);font-size:11px;margin-right:4px;white-space:nowrap}

  .pv-actions{margin-top:26px;display:flex;align-items:stretch;gap:1px;background:var(--ink);width:fit-content}
  .btn{
    display:inline-flex;align-items:center;gap:8px;height:34px;padding:0 16px;
    font:inherit;font-size:12.5px;cursor:pointer;
    background:var(--ink);color:var(--bg);border:0;white-space:nowrap;text-decoration:none;
  }
  .btn .ar{font-family:var(--mono)}
  .btn:hover{background:#000}
  .btn.ghost{background:var(--bg);color:var(--ink)}
  .btn.ghost:hover{background:var(--soft)}

  .kbd-hint{
    margin-top:24px;padding-top:14px;border-top:1px solid var(--rule);
    font-family:var(--mono);font-size:10.5px;color:var(--muted);
    display:flex;gap:22px;align-items:center;letter-spacing:0.04em;text-transform:uppercase;
  }
  .kbd-hint kbd{
    display:inline-flex;align-items:center;justify-content:center;
    min-width:18px;height:18px;padding:0 5px;font-size:10px;
    border:1px solid var(--rule);background:var(--bg);color:var(--ink);
    margin:0 4px;letter-spacing:0;text-transform:none;
  }
  .kbd-hint span{white-space:nowrap}

  .preview-empty{
    display:flex;align-items:center;justify-content:center;height:100%;
    font-family:var(--mono);font-size:11px;color:var(--hint);letter-spacing:0.1em;text-transform:uppercase;
  }
  .load-msg{padding:24px;font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.06em}
  .error-msg{padding:24px;font-family:var(--mono);font-size:11px;color:var(--red);letter-spacing:0.04em}
</style>
</head>
<body>

<header class="site-top">
  <div class="markid">
    <span class="h">HH</span>
    <span class="name">Hunter House <span class="dim">· Foundation</span></span>
  </div>
  <nav class="site-nav">
    <a href="the-house.html">House</a>
    <a href="archive.html">Archive</a>
    <a href="browse.html" class="on">Browse</a>
    <a href="richard-hunter.html">Hunter</a>
    <a href="about.html">About</a>
  </nav>
  <div class="site-topright" id="topright">— items · v0.4</div>
</header>

<div class="controls">
  <div class="search">
    <span class="sym">/</span>
    <input id="search-input" placeholder="Search by title, ID, or type…" autocomplete="off">
    <kbd>/</kbd>
  </div>
  <div class="fbtn" id="fbtn-sort">
    <span class="lbl">Sort</span>
    <span class="val">Type <span class="car">▾</span></span>
  </div>
  <div class="fbtn" id="fbtn-type">
    <span class="lbl">Type</span>
    <span class="val" id="fbtn-type-val">All <span class="car">▾</span></span>
  </div>
  <div class="ctrl-count">
    <b id="count-display">—</b> <span id="count-label">items</span>
  </div>
</div>

<div class="shell">

  <section class="pane-list">
    <div class="rowhead">
      <span>№</span>
      <span>ID</span>
      <span>Title · Type</span>
      <span class="r">—</span>
      <span class="r">Type</span>
    </div>
    <div class="rows" id="rows">
      <div class="load-msg">Loading items from Wikibase…</div>
    </div>
  </section>

  <section class="pane-preview" id="preview">
    <div class="preview-empty">Select an item from the list</div>
  </section>

</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────
  const WIKIBASE_URL = "https://hunterhouse.wikibase.cloud";
  const SPARQL_URL   = WIKIBASE_URL + "/query/sparql";
  const API_URL      = WIKIBASE_URL + "/w/api.php";

  // ── State ────────────────────────────────────────────────────────────
  let allItems       = [];   // flat array, ordered by type group
  let visibleIndexes = [];   // allItems indexes currently visible
  let selectedIdx    = -1;   // index into allItems
  let activeType     = null; // null = all types

  // ── SPARQL query (unchanged) ─────────────────────────────────────────
  const Q_LIST_ITEMS = `
    SELECT ?item ?itemLabel ?itemDescription WHERE {
      ?item rdfs:label ?itemLabel .
      FILTER(LANG(?itemLabel) = "en")
      FILTER(REGEX(STR(?item), "/entity/Q[0-9]+$"))
      OPTIONAL {
        ?item schema:description ?itemDescription .
        FILTER(LANG(?itemDescription) = "en")
      }
    }
    LIMIT 2000
  `;

  // ── Helpers (unchanged) ──────────────────────────────────────────────
  async function sparqlQuery(query) {
    const url = SPARQL_URL + "?query=" + encodeURIComponent(query) + "&format=json";
    const res = await fetch(url, { headers: { Accept: "application/sparql-results+json" } });
    if (!res.ok) throw new Error("SPARQL " + res.status);
    return (await res.json()).results.bindings;
  }

  async function fetchTypeMap(qids) {
    const typeMap    = {};   // qid → type QID
    const previewMap = {};   // qid → preview URL string
    const batches = [];
    for (let i = 0; i < qids.length; i += 50) batches.push(qids.slice(i, i + 50));
    await Promise.all(batches.map(async batch => {
      try {
        const url = API_URL + "?action=wbgetentities&ids=" + encodeURIComponent(batch.join("|")) +
                    "&props=claims&format=json&origin=*";
        const json = await (await fetch(url)).json();
        for (const qid of batch) {
          const entity = json.entities?.[qid];
          if (!entity) continue;
          const tqid = entity.claims?.P1?.[0]?.mainsnak?.datavalue?.value?.id;
          if (tqid) typeMap[qid] = tqid;
          const purl = entity.claims?.P96?.[0]?.mainsnak?.datavalue?.value;
          if (purl) previewMap[qid] = purl;
        }
      } catch (e) { console.warn("type fetch failed:", e); }
    }));
    return { typeMap, previewMap };
  }

  async function fetchLabels(qids) {
    const labels = {};
    const unique = [...new Set(qids)];
    const batches = [];
    for (let i = 0; i < unique.length; i += 50) batches.push(unique.slice(i, i + 50));
    await Promise.all(batches.map(async batch => {
      try {
        const url = API_URL + "?action=wbgetentities&ids=" + encodeURIComponent(batch.join("|")) +
                    "&props=labels&format=json&origin=*";
        const json = await (await fetch(url)).json();
        for (const qid of batch) {
          const v = json.entities?.[qid]?.labels?.en?.value;
          if (v) labels[qid] = v;
        }
      } catch (e) { console.warn("label fetch failed:", e); }
    }));
    return labels;
  }

  function qidFromURI(uri) { return uri.split("/").pop(); }

  function escapeHTML(s) {
    if (s == null) return "";
    return String(s).replace(/[&<>"']/g, c =>
      ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  }

  // ── Render helpers ───────────────────────────────────────────────────
  const TYPE_ABBREVS = {
    "archive item": "Item", "archival item": "Item", "drawing": "Draw.",
    "photograph": "Photo", "phase": "Phase", "work": "Work",
    "person": "Person", "institution": "Inst.", "place": "Place",
    "event": "Event", "building": "Bldg.", "area": "Area",
  };

  function abbreviateType(t) {
    return TYPE_ABBREVS[t.toLowerCase()] ||
      t.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 5);
  }

  // Format a QID for display as a large mono archive ID in the preview pane
  function formatBigId(qid) {
    // Q–NNN style with red separator
    return `Q<span class="br">–</span>${escapeHTML(qid.slice(1))}`;
  }

  // ── Build the row list ───────────────────────────────────────────────
  function buildList(itemsByType) {
    // Sort: Archive Item first, Untyped last, rest alphabetical
    const typeOrder = Object.keys(itemsByType).sort((a, b) => {
      if (a === "Untyped") return 1;
      if (b === "Untyped") return -1;
      const aIsArchive = a.toLowerCase().includes("archive item") || a.toLowerCase().includes("archival");
      const bIsArchive = b.toLowerCase().includes("archive item") || b.toLowerCase().includes("archival");
      if (aIsArchive && !bIsArchive) return -1;
      if (!aIsArchive && bIsArchive) return 1;
      return a.localeCompare(b);
    });

    allItems = [];
    typeOrder.forEach(typeKey => {
      const sorted = itemsByType[typeKey].slice().sort((a, b) =>
        (a.label || "").localeCompare(b.label || ""));
      sorted.forEach(item => allItems.push({ ...item, typeKey }));
    });

    document.getElementById("topright").textContent = allItems.length + " items · v0.4";

    renderRows(allItems);
    syncVisibleIndexes();
    updateCount();

    // Auto-select from URL or first item
    const urlId = new URLSearchParams(location.search).get("id");
    if (urlId) {
      const idx = allItems.findIndex(it => it.qid === urlId);
      if (idx >= 0) { selectItem(idx, false); return; }
    }
    if (allItems.length > 0) selectItem(0, false);
  }

  function renderRows(items) {
    const rowsEl = document.getElementById("rows");
    rowsEl.innerHTML = "";

    let currentType = null;
    let globalN = 0;

    items.forEach((item, i) => {
      if (item.typeKey !== currentType) {
        currentType = item.typeKey;
        const count = items.filter(it => it.typeKey === currentType).length;
        const d = document.createElement("div");
        d.className = "phase-divider";
        d.dataset.type = currentType;
        d.innerHTML = `<span>${escapeHTML(currentType)}</span><span class="r">${String(count).padStart(2, "0")} items</span>`;
        rowsEl.appendChild(d);
      }

      globalN++;
      const row = document.createElement("div");
      row.className = "row";
      row.dataset.idx = String(i);
      row.dataset.type = item.typeKey;
      row.innerHTML =
        `<span class="ix">${String(globalN).padStart(2, "0")}</span>` +
        `<span class="archid">${escapeHTML(item.qid)}</span>` +
        `<span class="title">${escapeHTML(item.label || item.qid)}</span>` +
        `<span class="year">—</span>` +
        `<span class="ty">${escapeHTML(abbreviateType(item.typeKey))}</span>`;
      row.addEventListener("click", () => selectItem(i));
      rowsEl.appendChild(row);
    });
  }

  function syncVisibleIndexes() {
    visibleIndexes = [];
    document.querySelectorAll(".row").forEach(row => {
      if (row.style.display !== "none") {
        visibleIndexes.push(parseInt(row.dataset.idx, 10));
      }
    });
  }

  // ── Selection ────────────────────────────────────────────────────────
  function selectItem(allIdx, pushState = true) {
    document.querySelectorAll(".row.sel").forEach(r => r.classList.remove("sel"));

    if (allIdx < 0 || allIdx >= allItems.length) return;
    selectedIdx = allIdx;

    const row = document.querySelector(`.row[data-idx="${allIdx}"]`);
    if (row) {
      row.classList.add("sel");
      row.scrollIntoView({ block: "nearest" });
    }

    const item = allItems[allIdx];
    if (pushState) {
      history.pushState({ idx: allIdx, qid: item.qid }, "",
        `?id=${encodeURIComponent(item.qid)}`);
    }

    renderPreview(item, allIdx);
  }

  function selectPrev() {
    const pos = visibleIndexes.indexOf(selectedIdx);
    if (pos > 0) selectItem(visibleIndexes[pos - 1]);
  }

  function selectNext() {
    const pos = visibleIndexes.indexOf(selectedIdx);
    if (pos >= 0 && pos < visibleIndexes.length - 1) selectItem(visibleIndexes[pos + 1]);
  }

  // ── Preview pane ─────────────────────────────────────────────────────
  function renderPreview(item, allIdx) {
    const pane = document.getElementById("preview");

    const visPos = visibleIndexes.indexOf(allIdx);
    const visTot = visibleIndexes.length;
    const num = String(visPos + 1).padStart(2, "0");
    const tot = String(visTot).padStart(2, "0");

    const hasPrev = visPos > 0;
    const hasNext = visPos < visibleIndexes.length - 1;

    const prevLink = hasPrev
      ? `<a href="#" id="pv-prev">← prev</a>`
      : `<span style="color:var(--hint)">← prev</span>`;
    const nextLink = hasNext
      ? `<a href="#" id="pv-next">next →</a>`
      : `<span style="color:var(--hint)">next →</span>`;

    const descHtml = item.description
      ? `<p class="pv-lede">${escapeHTML(item.description)}</p>`
      : "";

    pane.innerHTML = `
      <div class="preview-head">
        <div class="lh">
          <div class="archid-big">${formatBigId(item.qid)}</div>
          <div class="preview-sub">${escapeHTML(item.typeKey || "Item")} · ${num} / ${tot}</div>
        </div>
        <div class="preview-nav">${prevLink}${nextLink}</div>
      </div>

      <div class="plate">
        ${item.previewUrl
          ? `<img src="${escapeHTML(item.previewUrl)}" alt="${escapeHTML(item.label || item.qid)}">`
          : `<div class="plate-placeholder">No image</div>`}
      </div>

      <div class="plate-caption">
        <span class="l">${escapeHTML(item.qid)}</span>
        <span class="m">${escapeHTML(item.typeKey || "—")}</span>
        <span>↗ Full record</span>
      </div>

      <h1 class="pv-title">${escapeHTML(item.label || item.qid)}</h1>
      <div class="pv-orig">
        <span class="lb">Type</span>
        <span class="vl">${escapeHTML(item.typeKey || "—")}</span>
      </div>

      ${descHtml}

      <dl class="pv-meta">
        <dt>Wikibase</dt>
        <dd style="font-family:var(--mono);font-size:11px;color:var(--muted)">${escapeHTML(item.qid)}</dd>
        ${item.description ? `<dt>Description</dt><dd>${escapeHTML(item.description)}</dd>` : ""}
      </dl>

      <div class="pv-actions">
        <a class="btn" href="item.html?id=${encodeURIComponent(item.qid)}">Open record <span class="ar">→</span></a>
        <button class="btn ghost" type="button" onclick="navigator.clipboard?.writeText(location.href)">Copy link</button>
      </div>

      <div class="kbd-hint">
        <span><kbd>↑</kbd><kbd>↓</kbd> Nav</span>
        <span><kbd>↵</kbd> Open</span>
        <span><kbd>/</kbd> Search</span>
        <span><kbd>F</kbd> Filter</span>
      </div>
    `;

    const pp = document.getElementById("pv-prev");
    const pn = document.getElementById("pv-next");
    if (pp) pp.addEventListener("click", e => { e.preventDefault(); selectPrev(); });
    if (pn) pn.addEventListener("click", e => { e.preventDefault(); selectNext(); });
  }

  // ── Search / filter ──────────────────────────────────────────────────
  function applySearch() {
    const q = document.getElementById("search-input").value.trim().toLowerCase();

    document.querySelectorAll(".row").forEach(row => {
      const text = (row.textContent || "").toLowerCase();
      const matchesSearch = !q || text.includes(q);
      const matchesType = !activeType || row.dataset.type === activeType;
      row.style.display = matchesSearch && matchesType ? "" : "none";
    });

    // Hide dividers that have no visible rows below them
    document.querySelectorAll(".phase-divider").forEach(div => {
      let next = div.nextElementSibling;
      let any = false;
      while (next && !next.classList.contains("phase-divider")) {
        if (next.classList.contains("row") && next.style.display !== "none") any = true;
        next = next.nextElementSibling;
      }
      div.style.display = any ? "" : "none";
    });

    syncVisibleIndexes();
    updateCount();
  }

  function updateCount() {
    const total   = allItems.length;
    const matched = visibleIndexes.length;
    const el = document.getElementById("count-display");
    const lb = document.getElementById("count-label");
    if (!el) return;
    if (matched === total) {
      el.textContent = String(total).padStart(2, "0");
      lb.textContent = "items";
    } else {
      el.textContent = String(matched).padStart(2, "0") + " / " + String(total).padStart(2, "0");
      lb.textContent = "matched";
    }
  }

  // Type filter button
  document.getElementById("fbtn-type").addEventListener("click", () => {
    // Cycle through types
    const types = [...new Set(allItems.map(it => it.typeKey))].sort();
    if (!activeType) {
      activeType = types[0];
    } else {
      const idx = types.indexOf(activeType);
      activeType = idx >= 0 && idx < types.length - 1 ? types[idx + 1] : null;
    }
    const btn = document.getElementById("fbtn-type");
    const val = document.getElementById("fbtn-type-val");
    if (activeType) {
      btn.classList.add("active");
      val.innerHTML = escapeHTML(activeType) + ` <span class="car">▾</span>`;
    } else {
      btn.classList.remove("active");
      val.innerHTML = `All <span class="car">▾</span>`;
    }
    applySearch();
  });

  // ── Keyboard ─────────────────────────────────────────────────────────
  document.addEventListener("keydown", e => {
    const inInput = document.activeElement && document.activeElement.tagName === "INPUT";

    if (e.key === "/" && !inInput) {
      e.preventDefault();
      document.getElementById("search-input").focus();
      return;
    }
    if ((e.key === "f" || e.key === "F") && !inInput) {
      e.preventDefault();
      document.getElementById("fbtn-type").click();
      return;
    }
    if (e.key === "Escape" && inInput) {
      document.getElementById("search-input").value = "";
      document.getElementById("search-input").blur();
      applySearch();
      return;
    }
    if (e.key === "ArrowDown" && !inInput) {
      e.preventDefault();
      selectNext();
      return;
    }
    if (e.key === "ArrowUp" && !inInput) {
      e.preventDefault();
      selectPrev();
      return;
    }
    if (e.key === "Enter" && !inInput && selectedIdx >= 0) {
      e.preventDefault();
      window.location.href = "item.html?id=" + encodeURIComponent(allItems[selectedIdx].qid);
      return;
    }
  });

  document.getElementById("search-input").addEventListener("input", applySearch);

  // ── Main ─────────────────────────────────────────────────────────────
  (async function main() {
    try {
      const rows = await sparqlQuery(Q_LIST_ITEMS);

      const itemMap = {};
      rows.forEach(r => {
        const qid = qidFromURI(r.item.value);
        if (!itemMap[qid]) itemMap[qid] = {
          qid,
          label:       r.itemLabel       ? r.itemLabel.value       : qid,
          description: r.itemDescription ? r.itemDescription.value : null,
        };
      });

      const qids = Object.keys(itemMap);
      if (qids.length === 0) {
        document.getElementById("rows").innerHTML =
          `<div class="load-msg">No items found in Wikibase.</div>`;
        return;
      }

      const { typeMap, previewMap } = await fetchTypeMap(qids);
      const typeQIDs   = [...new Set(Object.values(typeMap))];
      const typeLabels = typeQIDs.length ? await fetchLabels(typeQIDs) : {};

      const byType = {};
      qids.forEach(qid => {
        const tqid  = typeMap[qid];
        const tlbl  = tqid ? (typeLabels[tqid] || tqid) : "Untyped";
        if (!byType[tlbl]) byType[tlbl] = [];
        byType[tlbl].push({ ...itemMap[qid], previewUrl: previewMap[qid] || null });
      });

      buildList(byType);

    } catch (err) {
      console.error(err);
      document.getElementById("rows").innerHTML =
        `<div class="error-msg">Error loading: ${escapeHTML(err.message)}</div>`;
    }
  })();
</script>

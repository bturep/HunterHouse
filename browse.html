<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Browse the catalogue — Hunter House Foundation</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/verso.css">
<style>
  /* browse-surface overrides */
  html,body{overflow:hidden}
  body{display:flex;flex-direction:column}
  .site-top{padding:14px 28px;flex-shrink:0}
  .controls{flex-shrink:0}
  .site-nav a{padding:5px 16px}

  /* ── controls bar ── */
  .controls{
    display:flex;align-items:stretch;
    padding:0 28px;border-bottom:1px solid var(--ink);background:var(--bg);
  }
  .search{
    flex:1;display:flex;align-items:center;gap:10px;
    padding:10px 24px 10px 0;border-right:1px solid var(--rule);margin-right:24px;
  }
  .search input{
    font:inherit;font-size:14px;background:none;border:0;outline:0;
    color:var(--ink);width:100%;letter-spacing:-0.005em;
  }
  .search input::placeholder{color:var(--hint)}
  .search kbd{
    font-family:var(--mono);font-size:10px;color:var(--hint);
    border:1px solid var(--rule);padding:2px 6px;background:var(--paper);
    border-radius:2px;flex-shrink:0;
  }
  .fbtn{
    display:flex;flex-direction:column;justify-content:center;gap:2px;
    padding:0 18px;border-right:1px solid var(--rule);cursor:pointer;user-select:none;
    position:relative;
  }
  .fbtn .lbl{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.16em;text-transform:uppercase;white-space:nowrap}
  .fbtn .val{font-size:12px;color:var(--ink);white-space:nowrap}
  .fbtn .val .car{font-family:var(--mono);font-size:9px;color:var(--hint);margin-left:6px}
  .fbtn:hover{background:var(--soft)}
  .fbtn.active{background:var(--copper-pale)}
  .fbtn.active .lbl{color:var(--copper-deep)}
  .fbtn.active .val{color:var(--copper-deep)}
  .fbtn.active:hover{background:var(--copper-pale)}
  .ctrl-count{
    display:flex;align-items:center;padding:0 22px;
    font-family:var(--mono);font-size:11px;color:var(--muted);
    letter-spacing:0.04em;font-variant-numeric:tabular-nums;white-space:nowrap;
  }
  .ctrl-count b{color:var(--ink);font-weight:500;margin-right:4px}

  /* ── dropdowns ── */
  .fdrop{
    display:none;position:absolute;top:100%;left:0;z-index:200;
    background:var(--bg);border:1px solid var(--ink);border-top:0;
    min-width:200px;list-style:none;margin:0;padding:0;
  }
  .fbtn.open .fdrop{display:block}
  .fdrop li{
    font-family:var(--mono);font-size:11px;color:var(--ink);letter-spacing:0.02em;
    padding:9px 16px;cursor:pointer;border-bottom:1px solid var(--rule-soft);white-space:nowrap;
  }
  .fdrop li:last-child{border-bottom:0}
  .fdrop li:hover{background:var(--soft)}
  .fdrop li.all{color:var(--muted)}
  .fdrop li.sel{font-weight:500}

  /* ── three-column shell ── */
  .shell{
    display:grid;grid-template-columns:28% 1fr 28%;
    flex:1;min-height:0;
  }

  /* ── list fleuron ── */
  .list-fleuron{display:flex;justify-content:center;align-items:center;height:25vh;margin-top:20px;padding-bottom:32px}
  .list-fleuron img{width:120px;height:120px;object-fit:contain;image-rendering:crisp-edges}
  .pane-list{border-right:1px solid var(--ink);display:flex;flex-direction:column;min-width:0;overflow:hidden;background:var(--bg)}
  .pane-image{background:var(--paper);display:flex;flex-direction:column;min-width:0;overflow:hidden;position:relative}
  .pane-meta{border-left:1px solid var(--ink);display:flex;flex-direction:column;min-width:0;overflow:hidden;background:var(--bg)}

  /* ── list pane ── */
  .list-head{
    display:grid;grid-template-columns:104px 1fr 50px;gap:12px;align-items:center;
    height:41px;box-sizing:border-box;padding:0 20px;
    font-family:var(--mono);font-size:9.5px;color:var(--muted);
    letter-spacing:0.18em;text-transform:uppercase;
    border-bottom:1px solid var(--ink);flex-shrink:0;position:relative;
  }
  .list-head .id-col{display:flex;align-items:center;gap:5px;position:relative}
  .list-head .r{text-align:right}
  .rows{flex:1;overflow-y:auto}

  /* ── phase dividers ── */
  .phase-divider{
    display:grid;grid-template-columns:1fr auto;gap:14px;
    padding:16px 20px 6px;border-bottom:1px solid var(--ink);
    font-family:var(--mono);font-size:10px;color:var(--copper-deep);
    letter-spacing:0.18em;text-transform:uppercase;background:var(--bg);
  }
  .phase-divider .r{color:var(--muted);white-space:nowrap}

  /* ── sort header buttons ── */
  .sort-hd{
    background:none;border:none;padding:0;margin:0;
    font:inherit;color:inherit;letter-spacing:inherit;text-transform:inherit;
    cursor:pointer;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;
  }
  .list-head > .sort-hd{width:100%}
  .list-head > .sort-hd.r{justify-content:flex-end}
  .sort-hd:hover{color:var(--ink)}
  .sort-hd.active{color:var(--ink)}
  .sort-arrow{font-size:7px;line-height:1;font-family:var(--sans);letter-spacing:0}
  .sort-hd:not(.active):hover .sort-arrow::after{content:"↕";color:var(--rule)}

  /* ── legend button + popover ── */
  .legend-btn{
    font-family:var(--mono);font-size:8.5px;color:var(--muted);
    border:1px solid var(--rule);background:none;border-radius:1px;
    padding:0 4px;line-height:1.35;display:inline-flex;align-items:center;justify-content:center;
    cursor:pointer;flex-shrink:0;letter-spacing:0.04em;
  }
  .legend-btn:hover{color:var(--ink);border-color:var(--muted)}
  .legend-pop{
    position:absolute;top:calc(100% + 4px);left:0;z-index:300;
    background:var(--bg);border:1px solid var(--ink);padding:4px 0;min-width:160px;
  }
  .leg-row{
    display:grid;grid-template-columns:32px 1fr;gap:10px;
    padding:5px 12px;font-family:var(--mono);font-size:10px;
  }
  .leg-code{color:var(--copper-deep);font-weight:500}
  .leg-label{color:var(--muted)}

  .row{
    display:grid;grid-template-columns:104px 1fr 50px;gap:12px;
    padding:11px 20px;align-items:start;cursor:pointer;
    border-bottom:1px dashed var(--rule);position:relative;
  }
  .row .archid{
    font-family:var(--mono);font-size:11px;color:var(--ink);
    letter-spacing:0.02em;font-weight:500;white-space:nowrap;padding-top:2px;
    display:flex;align-items:baseline;gap:6px;
  }
  .row .archid .tmark{
    font-family:var(--mono);font-size:8.5px;
    letter-spacing:0.08em;text-transform:uppercase;font-weight:500;
    padding:0 4px;border-radius:1px;line-height:1.35;flex-shrink:0;
    min-width:24px;text-align:center;
    /* defaults (drawing) */
    color:var(--copper-deep);border:1px solid var(--copper-pale);background:var(--copper-pale);
  }
  .row .archid .tmark[data-type="P"]{color:#3d6b8a;border-color:#c8dde9;background:#e8f2f8}
  .row .archid .tmark[data-type="PM"]{color:#4e6b40;border-color:#c8d9be;background:#e8f2e2}
  .row .archid .tmark[data-type="E"]{color:#6b4e6b;border-color:#d9bed9;background:#f2e8f2}
  .row .archid .tmark[data-type="R"]{color:#6b5a3d;border-color:#d9cdb8;background:#f2ede4}
  .row .archid .tmark[data-type="LS"]{color:#3d6b5a;border-color:#bed9ce;background:#e2f2ec}
  .row .archid .tmark[data-type="EN"]{color:#5a3d6b;border-color:#cdb8d9;background:#ede4f2}
  .row.sel .archid .tmark{color:var(--red-deep)!important;border-color:var(--red-pale)!important;background:var(--red-pale)!important}
  .row .title-wrap{min-width:0;overflow:hidden}
  .row .title{
    font-size:13px;letter-spacing:-0.005em;color:var(--ink);
    line-height:1.35;overflow:hidden;text-overflow:ellipsis;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  }
  .row .ph{
    font-family:var(--mono);font-size:9.5px;color:var(--copper-deep);
    letter-spacing:0.04em;margin-top:4px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .row .year{
    font-family:var(--mono);font-size:11px;color:var(--muted);
    text-align:right;font-variant-numeric:tabular-nums;
    white-space:nowrap;padding-top:2px;
  }
  .row:hover{background:var(--soft)}
  .row.sel{background:var(--red-tint)}
  .row.sel::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red)}
  .row.sel .archid{color:var(--red-deep)}

  /* ── image pane ── */
  .image-head{
    display:flex;justify-content:space-between;align-items:center;
    height:41px;box-sizing:border-box;padding:0 24px;
    border-bottom:1px solid var(--ink);background:var(--bg);flex-shrink:0;
  }
  .image-head .l{font-family:var(--mono);font-size:11px;color:var(--ink);font-weight:500;letter-spacing:0.02em;white-space:nowrap}
  .image-head .l .pos{color:var(--muted);font-weight:400;margin-left:12px}
  .image-head .r{display:flex;gap:14px;align-items:baseline}
  .image-head .r a{font-family:var(--mono);font-size:10.5px;color:var(--muted);text-decoration:none;letter-spacing:0.04em;white-space:nowrap}
  .image-head .r a:hover{color:var(--ink)}
  .image-head .r a.disabled{color:var(--hint);pointer-events:none}

  .image-stage{
    flex:1;position:relative;overflow:hidden;
    background:var(--paper);display:flex;align-items:center;justify-content:center;
  }
  .image-stage .canvas{
    width:100%;height:100%;position:relative;overflow:hidden;cursor:grab;
  }
  .image-stage .canvas.grabbing{cursor:grabbing}
  .image-stage .canvas.no-zoom{cursor:default}
  .image-stage img{
    position:absolute;top:50%;left:50%;transform-origin:0 0;
    user-select:none;-webkit-user-drag:none;pointer-events:none;
    max-width:none;max-height:none;display:block;
    border:1px solid var(--rule);box-shadow:0 8px 24px -10px rgba(30,28,26,0.22);
  }
  .image-stage .placeholder{
    font-family:var(--mono);font-size:10.5px;color:var(--hint);
    letter-spacing:0.12em;text-transform:uppercase;text-align:center;
    width:100%;height:100%;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:6px;
  }
  .image-stage .placeholder b{color:var(--muted);font-weight:500}

  .zoom-ctl{
    position:absolute;bottom:16px;right:16px;
    display:flex;align-items:stretch;
    background:var(--bg);border:1px solid var(--ink);
    font-family:var(--mono);font-size:11px;user-select:none;z-index:5;
  }
  .zoom-ctl button{
    background:none;border:0;font:inherit;color:var(--ink);
    padding:6px 12px;cursor:pointer;border-right:1px solid var(--rule);
    display:flex;align-items:center;justify-content:center;min-width:30px;
  }
  .zoom-ctl button:last-child{border-right:0}
  .zoom-ctl button:hover{background:var(--soft)}
  .zoom-ctl button:disabled{color:var(--hint);cursor:not-allowed}
  .zoom-ctl button:disabled:hover{background:var(--bg)}
  .zoom-ctl .pct{padding:6px 12px;color:var(--muted);border-right:1px solid var(--rule);font-variant-numeric:tabular-nums;min-width:54px;text-align:center}

  .image-foot{
    padding:10px 24px;border-top:1px solid var(--ink);background:var(--bg);
    display:flex;justify-content:space-between;align-items:baseline;
    font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.06em;flex-shrink:0;
  }
  .image-foot .l{color:var(--ink);font-weight:500;white-space:nowrap}
  .image-foot .m{color:var(--muted);letter-spacing:0.04em}
  .image-foot .r a{color:var(--copper-deep);text-decoration:none;border-bottom:1px solid var(--copper-pale)}

  /* ── meta pane ── */
  .meta-head{
    height:41px;box-sizing:border-box;padding:0 22px;
    border-bottom:1px solid var(--ink);background:var(--bg);
    display:flex;justify-content:space-between;align-items:center;flex-shrink:0;
  }
  .meta-head .l{font-family:var(--mono);font-size:11px;color:var(--ink);font-weight:500;letter-spacing:0.18em;text-transform:uppercase}
  .meta-head .r{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.06em;white-space:nowrap}
  .meta-body{flex:1;overflow-y:auto;padding:22px 22px 32px}

  .meta-title{font-size:21px;font-weight:500;color:var(--ink);letter-spacing:-0.015em;line-height:1.2;margin-bottom:8px}
  .meta-title-sub{display:block;font-size:13px;font-weight:400;color:var(--muted);letter-spacing:0;margin-top:4px}
  .meta-orig{
    font-family:var(--mono);font-size:9.5px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;
    padding:6px 0;margin-bottom:18px;border-bottom:1px dotted var(--rule);
  }
  .meta-orig .lb{color:var(--hint);margin-right:8px;letter-spacing:0.14em}
  .meta-orig .vl{color:var(--ink);font-weight:500;letter-spacing:0.04em}
  .meta-lede{font-size:13px;line-height:1.6;color:var(--ink);margin-bottom:24px;font-weight:300;letter-spacing:-0.005em}

  .meta-section{margin-bottom:24px}
  .meta-section h3{
    font-family:var(--mono);font-size:9.5px;color:var(--ink);
    letter-spacing:0.18em;text-transform:uppercase;font-weight:500;
    padding-bottom:8px;border-bottom:1px solid var(--ink);margin-bottom:12px;
    display:flex;justify-content:space-between;align-items:baseline;
    flex-wrap:nowrap;gap:12px;
  }
  .meta-section h3 > span:first-child{flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .meta-section h3 .n{color:var(--red);font-weight:400;margin-right:8px}
  .meta-section h3 .ct{color:var(--muted);font-weight:400;letter-spacing:0.06em;white-space:nowrap;flex-shrink:0}

  .kv{margin:0}
  .kv > .row{
    display:grid;grid-template-columns:84px 1fr;gap:20px;
    padding:7px 0;border-bottom:1px solid var(--rule-soft);
    align-items:baseline;cursor:default;border-left:0;
  }
  .kv > .row::before{display:none}
  .kv > .row:last-child{border-bottom:0}
  .kv > .row:hover{background:transparent}
  .kv dt{font-family:var(--mono);font-size:9.5px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;white-space:nowrap;margin:0;padding:0}
  .kv dd{font-size:12.5px;color:var(--ink);letter-spacing:-0.005em;line-height:1.5;margin:0;padding:0}
  .kv dd a{color:var(--copper-deep);text-decoration:none;border-bottom:1px solid var(--copper-pale)}
  .kv dd a:hover{border-bottom-color:var(--copper-deep)}

  /* browse-local pill/archid (smaller than verso.css defaults) */
  .pill{display:inline-flex;align-items:center;height:18px;padding:0 7px;font-size:10.5px;margin:0 3px 3px 0;white-space:nowrap}
  button.area-pill,button.type-pill,button.drawtype-pill{border:none;cursor:pointer;font-family:inherit;background:var(--pb,var(--copper-pale));color:var(--pf,var(--copper-deep))}
  button.area-pill:hover,button.area-pill.active,
  button.type-pill:hover,button.type-pill.active,
  button.drawtype-pill:hover,button.drawtype-pill.active{background:var(--pd,var(--copper-deep));color:var(--bg)}
  button.type-pill{height:auto;padding:3px 8px;align-items:center;gap:0}
  .archid-mono{font-family:var(--mono);font-size:11px;color:var(--red);background:var(--red-pale);padding:1.5px 7px;letter-spacing:0.04em;white-space:nowrap}
  .rights-note{display:block;font-size:10.5px;color:var(--muted);margin-top:3px;font-style:italic}
  .fonds-path{display:block;font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:0.01em}
  .cite-box{background:var(--soft);padding:12px 14px;margin-top:6px}
  .cite-box p{font-size:11.5px;line-height:1.75;color:var(--ink);margin:0 0 10px;letter-spacing:-0.002em}
  .cite-copy{font-family:var(--mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);background:none;border:1px solid var(--rule);padding:3px 9px;cursor:pointer}
  .cite-copy:hover{color:var(--ink);border-color:var(--muted)}
  /* dark mode overrides for hardcoded colours */
  html.dark .row .archid .tmark[data-type="P"]{color:#7aafc4;border-color:rgba(122,175,196,0.3);background:rgba(122,175,196,0.12)}
  html.dark .row .archid .tmark[data-type="PM"]{color:#85aa70;border-color:rgba(133,170,112,0.3);background:rgba(133,170,112,0.12)}
  html.dark .row .archid .tmark[data-type="E"]{color:#b08ab0;border-color:rgba(176,138,176,0.3);background:rgba(176,138,176,0.12)}
  html.dark .row .archid .tmark[data-type="R"]{color:#b0966a;border-color:rgba(176,150,106,0.3);background:rgba(176,150,106,0.12)}
  html.dark .row .archid .tmark[data-type="LS"]{color:#70aaa0;border-color:rgba(112,170,160,0.3);background:rgba(112,170,160,0.12)}
  html.dark .row .archid .tmark[data-type="EN"]{color:#9a7ac4;border-color:rgba(154,122,196,0.3);background:rgba(154,122,196,0.12)}
  html.dark .list-fleuron img{filter:invert(1)}

  .meta-actions{display:flex;align-items:stretch;gap:1px;background:var(--ink);width:fit-content;margin-bottom:20px}
  .btn{
    display:inline-flex;align-items:center;gap:6px;height:30px;padding:0 14px;
    font:inherit;font-size:11.5px;cursor:pointer;
    background:var(--ink);color:var(--bg);border:0;white-space:nowrap;text-decoration:none;
  }
  .btn .ar{font-family:var(--mono);font-size:11px}
  .btn:hover{background:#000}
  .btn.ghost{background:var(--bg);color:var(--ink)}
  .btn.ghost:hover{background:var(--soft)}

  /* ── graph-position panel ── */
  .graph-section{margin-top:8px}
  .graph-section h3{
    font-family:var(--mono);font-size:9.5px;color:var(--ink);
    letter-spacing:0.18em;text-transform:uppercase;font-weight:500;
    padding-bottom:8px;border-bottom:1px solid var(--ink);margin-bottom:14px;
    display:flex;justify-content:space-between;align-items:baseline;
    flex-wrap:nowrap;gap:12px;
  }
  .graph-section h3 > span:first-child{flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .graph-section h3 .n{color:var(--red);font-weight:400;margin-right:8px}
  .graph-section h3 .ct{color:var(--muted);font-weight:400;letter-spacing:0.06em;font-size:9px;white-space:nowrap;flex-shrink:0}

  .graph-path{margin-bottom:18px;font-family:var(--mono);font-size:10px;letter-spacing:0.04em;line-height:1.7}
  .graph-path .node{display:grid;grid-template-columns:18px 60px 1fr;gap:8px;align-items:baseline;padding:5px 0}
  .graph-path .node .tick{color:var(--hint);font-size:9px;text-align:center}
  .graph-path .node .rel{color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;font-size:8.5px;white-space:nowrap;padding-top:1px}
  .graph-path .node .lbl{font-size:11.5px;color:var(--ink);letter-spacing:-0.005em;font-family:var(--sans);font-weight:500;line-height:1.35}
  .graph-path .node.this .tick{color:var(--red);font-size:11px;line-height:1}
  .graph-path .node.this .lbl{color:var(--red-deep)}
  .graph-path .node a.lbl{color:var(--copper-deep);text-decoration:none;border-bottom:1px solid var(--copper-pale);font-weight:400}
  .graph-path .node a.lbl:hover{border-bottom-color:var(--copper-deep)}
  .graph-path .connector{margin-left:9px;padding-left:17px;border-left:1px dotted var(--rule);height:8px}

  .graph-siblings{margin-bottom:18px}
  .graph-siblings .lbl-row{
    display:flex;justify-content:space-between;align-items:baseline;
    font-family:var(--mono);font-size:8.5px;color:var(--muted);
    letter-spacing:0.14em;text-transform:uppercase;
    padding-bottom:7px;margin-bottom:6px;border-bottom:1px dotted var(--rule);
  }
  .graph-siblings .lbl-row .ct{color:var(--hint)}
  .graph-siblings .sib{
    display:grid;grid-template-columns:78px 1fr 28px;gap:8px;
    padding:5px 0;align-items:baseline;font-size:11px;line-height:1.35;
    text-decoration:none;color:inherit;cursor:pointer;
  }
  .graph-siblings .sib:hover{background:var(--soft)}
  .graph-siblings .sib.current{background:var(--red-tint);cursor:default}
  .graph-siblings .sib.current:hover{background:var(--red-tint)}

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  const WIKIBASE_URL = "https://hunterhouse.wikibase.cloud";
  const SPARQL_URL   = WIKIBASE_URL + "/query/sparql";
  const API_URL      = WIKIBASE_URL + "/w/api.php";

  // ── State ─────────────────────────────────────────────────────────────────
  const state = {
    items: [],
    filtered: [],
    selectedId: null,
    sortCol: "id",
    sortDir: "asc",
    search: "",
    filterCollection: "",
    filterArea: "",
    filterType: "",
    filterDrawType: "",
  };

  const BADGE_LEGEND = [
    ["D",  "Drawing"],
    ["P",  "Photograph"],
    ["LS", "Land survey"],
    ["EN", "Engineering document"],
    ["L",  "Letter / Correspondence"],
    ["N",  "Notebook / Sketch"],
    ["E",  "Ephemera"],
    ["PM", "Permit set"],
    ["R",  "Report"],
  ];

  // ── Utilities ─────────────────────────────────────────────────────────────
  const $ = sel => document.querySelector(sel);
  const escapeHTML = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  const displayId = id => escapeHTML((id || "").replace(/^HH-/, ""));
  const formatTitle = title => {
    const m = String(title || "").match(/^(.*?)\s*(\[.*\])\s*$/s);
    if (!m) return escapeHTML(title);
    return `${escapeHTML(m[1])}<span class="meta-title-sub">${escapeHTML(m[2])}</span>`;
  };
  const yearOf = d => d ? d.slice(0, 4) : "—";
  const imageUrl = it => it.image || null;
  const uniqueSorted = arr => Array.from(new Set(arr)).filter(Boolean).sort();

  // Archive abbreviation map — extend when new collections are added
  const ARCHIVE_ABBREV = {
    "canadian architectural archives": "CAA",
  };
  function archiveAbbrev(heldBy) {
    const hb = (heldBy || "").toLowerCase();
    return Object.entries(ARCHIVE_ABBREV).find(([k]) => hb.includes(k))?.[1] || null;
  }
  // Label for the notes row: reflects archive and whether it's a fonds location or a free note
  function notesLabel(item) {
    const abbrev = archiveAbbrev(item.heldBy);
    const hasFondsPath = (item.notes || "").includes(" — ");
    if (hasFondsPath) return abbrev ? `${abbrev} fonds` : "Fonds";
    return abbrev ? `${abbrev} note` : "Note";
  }
  // Render notes: split "Fonds name (accession) — S000, SS000, ..." onto two lines
  function formatNotes(notes) {
    const sep = notes.indexOf(" — ");
    if (sep === -1) return escapeHTML(notes);
    return `${escapeHTML(notes.slice(0, sep))}<span class="fonds-path">${escapeHTML(notes.slice(sep + 3))}</span>`;
  }
  // Chicago-style citation for an archive item
  function buildCitation(item) {
    const plainTitle = (item.title || "Untitled").replace(/\s*\[.*\]\s*$/, "").trim() || "Untitled";
    const year = item.date ? item.date.slice(0, 4) : "n.d.";
    const medStr = item.medium ? `. ${item.medium}` : "";
    const isCAA = archiveAbbrev(item.heldBy) === "CAA";
    let repoStr;
    if (isCAA && item.notes && item.notes.includes(" — ")) {
      const sep = item.notes.indexOf(" — ");
      const fondsName = item.notes.slice(0, sep);
      const pathPart = item.notes.slice(sep + 3).split(/\s*\./)[0].trim();
      repoStr = `${pathPart}, ${fondsName}, Canadian Architectural Archives, University of Calgary, Calgary, Alberta`;
    } else if (isCAA) {
      repoStr = "Richard Hunter fonds (2019.61), Canadian Architectural Archives, University of Calgary, Calgary, Alberta";
    } else {
      repoStr = "Hunter House Foundation Collection, Victoria, British Columbia";
    }
    return `Hunter, Richard. “${plainTitle}.” ${year}${medStr}. ${repoStr}. ${item.id}.`;
  }

  // Archive link label derived from held-by institution
  function archiveLinkLabel(heldBy) {
    const hb = (heldBy || "").toLowerCase();
    if (hb.includes("calgary") || hb.includes("canadian architectural"))
      return "↗ University of Calgary Special Collections";
    if (heldBy) return `↗ ${heldBy}`;
    return "↗ Archive record";
  }

  // ── Mobile tab switching ──────────────────────────────────────────────────
  function switchMobileTab(pane) {
    document.querySelectorAll(".mtab").forEach(t =>
      t.classList.toggle("active", t.dataset.pane === pane));
    ["list","image","meta"].forEach(p => {
      const el = document.querySelector(`.pane-${p}`);
      if (el) el.classList.toggle("mobile-active", p === pane);
    });
  }

  // ── Wikibase fetch layer ──────────────────────────────────────────────────
  async function sparqlQuery(q) {
    const url = SPARQL_URL + "?query=" + encodeURIComponent(q) + "&format=json";
    const res = await fetch(url, { headers: { Accept: "application/sparql-results+json" } });
    if (!res.ok) throw new Error("SPARQL " + res.status);
    return (await res.json()).results.bindings;
  }

  const CACHE_KEY = "hhf_catalogue_v16";

  function clearCache() {
    try { localStorage.removeItem(CACHE_KEY); } catch {}
  }

  async function loadFromWikibase() {
    try {
    } catch {}

    // Single SPARQL query — only items with P2 (archive ID) + P96 (preview image),
    // with all labels resolved inline. Multi-valued P87 (areas) creates duplicate rows;
    // we collapse them in the loop below.
    const Q = `
PREFIX wdt: <https://hunterhouse.wikibase.cloud/prop/direct/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
PREFIX wikibase: <http://wikiba.se/ontology#>
PREFIX bd: <http://www.bigdata.com/rdf#>
SELECT ?item ?archId ?label ?img ?master
       ?d1 ?d2 ?d3
       ?phase ?phaseLabel ?phase2 ?phase2Label
       ?drawType ?drawTypeLabel
       ?area ?areaLabel
       ?itype ?itypeLabel
       ?src ?srcLabel
       ?creator ?creatorLabel
       ?use
       ?builtStatus ?builtStatusLabel
       ?setPos ?notes ?medium
       ?rights ?rightsLabel
       ?heldBy ?heldByLabel
       ?archiveLink
WHERE {
  ?item wdt:P2 ?archId .
  ?item wdt:P96 ?img .
  ?item rdfs:label ?label . FILTER(LANG(?label)="en")
  OPTIONAL { ?item wdt:P95 ?master }
  OPTIONAL { ?item wdt:P82 ?d1 }
  OPTIONAL { ?item wdt:P64 ?d2 }
  OPTIONAL { ?item wdt:P118 ?d3 }
  OPTIONAL { ?item wdt:P62 ?phase . ?phase rdfs:label ?phaseLabel . FILTER(LANG(?phaseLabel)="en") }
  OPTIONAL { ?item wdt:P84 ?phase2 . ?phase2 rdfs:label ?phase2Label . FILTER(LANG(?phase2Label)="en") }
  OPTIONAL { ?item wdt:P88 ?drawType . ?drawType rdfs:label ?drawTypeLabel . FILTER(LANG(?drawTypeLabel)="en") }
  OPTIONAL { ?item wdt:P87 ?area . ?area rdfs:label ?areaLabel . FILTER(LANG(?areaLabel)="en") }
  OPTIONAL { ?item wdt:P1 ?itype . ?itype rdfs:label ?itypeLabel . FILTER(LANG(?itypeLabel)="en") }
  OPTIONAL { ?item wdt:P79 ?src . ?src rdfs:label ?srcLabel . FILTER(LANG(?srcLabel)="en") }
  OPTIONAL { ?item wdt:P80 ?creator . ?creator rdfs:label ?creatorLabel . FILTER(LANG(?creatorLabel)="en") }
  OPTIONAL { ?item wdt:P89 ?use }
  OPTIONAL { ?item wdt:P92 ?builtStatus . ?builtStatus rdfs:label ?builtStatusLabel . FILTER(LANG(?builtStatusLabel)="en") }
  OPTIONAL { ?item wdt:P86 ?setPos }
  OPTIONAL { ?item wdt:P100 ?notes }
  OPTIONAL { ?item wdt:P91 ?medium }
  OPTIONAL { ?item wdt:P93 ?rights . ?rights rdfs:label ?rightsLabel . FILTER(LANG(?rightsLabel)="en") }
  OPTIONAL { ?item wdt:P94 ?heldBy . ?heldBy rdfs:label ?heldByLabel . FILTER(LANG(?heldByLabel)="en") }
  OPTIONAL { ?item wdt:P99 ?archiveLink }
}`;

    const rows = await sparqlQuery(Q);
    const dateStr = v => v ? v.replace(/^\+/, "").split("T")[0] : null;
    const map = new Map();

    for (const r of rows) {
      const qid = r.item.value.split("/").pop();
      if (!map.has(qid)) {
        map.set(qid, {
          qid,
          id:               r.archId.value,
          title:            r.label.value,
          image:            r.img.value,
          master:           r.master?.value || null,
          date:             dateStr(r.d1?.value) || dateStr(r.d2?.value) || dateStr(r.d3?.value),
          phase:            r.phaseLabel?.value || r.phase2Label?.value || null,
          phaseQID:         r.phase?.value?.split("/").pop() || r.phase2?.value?.split("/").pop() || null,
          areas:            [],
          drawTypes:        [],
          itemType:         r.itypeLabel?.value || null,
          sourceCollection: r.srcLabel?.value || null,
          creator:          r.creatorLabel?.value || null,
          use:              r.use?.value || null,
          builtStatus:      r.builtStatusLabel?.value || null,
          setPosition:      r.setPos?.value || null,
          notes:            r.notes?.value || null,
          medium:           r.medium?.value || null,
          rights:           r.rightsLabel?.value || null,
          heldBy:           r.heldByLabel?.value || null,
          archiveLink:      r.archiveLink?.value || null,
        });
      }
      const it = map.get(qid);
      if (r.areaLabel?.value && !it.areas.includes(r.areaLabel.value))
        it.areas.push(r.areaLabel.value);
      if (r.drawTypeLabel?.value && !it.drawTypes.includes(r.drawTypeLabel.value))
        it.drawTypes.push(r.drawTypeLabel.value);
    }

    const items = [...map.values()].sort((a, b) => (a.id || "").localeCompare(b.id || ""));

    try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), items })); } catch {}

    return items;
  }

  // ── Filter + sort ─────────────────────────────────────────────────────────
  const idNum = it => parseInt((it.id || "").replace(/[^0-9]+/g, ""), 10) || 0;

  const DRAW_TYPE_PRIORITY = { "plan":1,"site plan":1,"floor plan":1,"foundation plan":1,
    "floor framing plan":1,"roof framing plan":1,"framing plan":1,"ceiling plan":1,
    "electrical plan":1,"land survey":1,"elevation":2,"section":3,"detail":4 };
  const drawTypePriority = t => DRAW_TYPE_PRIORITY[t.toLowerCase()] || 5;
  const sortDrawTypes = types => [...types].sort((a,b) =>
    drawTypePriority(a) - drawTypePriority(b) || a.localeCompare(b));

  function applyFilters() {
    const q = state.search.trim().toLowerCase();
    state.filtered = state.items.filter(it => {
      if (state.filterArea && !(it.areas||[]).includes(state.filterArea)) return false;
      if (state.filterType && it.itemType !== state.filterType) return false;
      if (state.filterDrawType && !(it.drawTypes||[]).includes(state.filterDrawType)) return false;
      if (q) {
        const hay = [it.id, it.title, it.phase, (it.drawTypes||[]).join(" "), (it.areas||[]).join(" "), it.creator, it.medium||"", it.notes||""].join(" ").toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
    const dir = state.sortDir === "asc" ? 1 : -1;
    const dateKey = it => it.date || "9999-99-99";
    const comparators = {
      "id":    (a, b) => dir * (a.id || "").localeCompare(b.id || ""),
      "phase": (a, b) => dir * (a.phase||"").localeCompare(b.phase||"") || (a.id||"").localeCompare(b.id||""),
      "year":  (a, b) => dir * dateKey(a).localeCompare(dateKey(b)) || (a.id||"").localeCompare(b.id||""),
    };
    state.filtered.sort(comparators[state.sortCol] || comparators["year"]);
  }

  // ── Sort header UI ────────────────────────────────────────────────────────
  function renderListHead() {
    ["id", "phase", "year"].forEach(col => {
      const btn   = document.querySelector(`.sort-hd[data-sort-col="${col}"]`);
      const arrow = document.getElementById(`sa-${col}`);
      if (!btn || !arrow) return;
      const active = state.sortCol === col;
      btn.classList.toggle("active", active);
      arrow.textContent = active ? (state.sortDir === "asc" ? "↑" : "↓") : "";
    });
  }

  // ── Render list ───────────────────────────────────────────────────────────
  const TYPE_MARKS = {
    "drawing":"D","photograph":"P","letter":"L","correspondence":"L",
    "engineering":"EN","engineering document":"EN","notebook":"N","sketch":"N",
    "ephemera":"E","permit":"PM","permit set":"PM","report":"R","land survey":"LS",
  };
  function typeMark(itemType) {
    if (!itemType) return "";
    return TYPE_MARKS[itemType.toLowerCase()] || itemType.slice(0,1).toUpperCase();
  }

  // Pill colour palette — 6 muted tones matching the badge colours
  // Pill colour tokens — drawn from the badge palette
  const PC = {
    copper: { pb:"#dde6df", pf:"#365549", pd:"#243a31" },
    blue:   { pb:"#e8f2f8", pf:"#3d6b8a", pd:"#2a4a62" },
    teal:   { pb:"#e2f2ec", pf:"#3d6b5a", pd:"#2a4a3e" },
    brown:  { pb:"#f2ede4", pf:"#6b5a3d", pd:"#4a3e2a" },
    purple: { pb:"#ede4f2", pf:"#5a3d6b", pd:"#3e2a4a" },
    green:  { pb:"#e8f2e2", pf:"#4e6b40", pd:"#354b2b" },
    mauve:  { pb:"#f2e8f2", pf:"#6b4e6b", pd:"#4a344a" },
  };
  // Item type pill → matches badge colour exactly
  const TYPE_PILL_COLORS = {
    "D": PC.copper, "P": PC.blue,   "PM": PC.green,
    "E": PC.mauve,  "R": PC.brown,  "LS": PC.teal, "EN": PC.purple,
  };
  // Drawing type → intentional fixed colour (4 groups + default)
  const DRAW_TYPE_COLORS = {
    "plan": PC.copper, "site plan": PC.copper, "floor plan": PC.copper,
    "foundation plan": PC.copper, "floor framing plan": PC.copper,
    "roof framing plan": PC.copper, "framing plan": PC.copper,
    "ceiling plan": PC.copper, "electrical plan": PC.copper,
    "elevation": PC.blue,
    "section": PC.teal,
    "detail": PC.brown,
    "land survey": PC.teal,
  };
  function pillStyle(c) {
    return `--pb:${c.pb};--pf:${c.pf};--pd:${c.pd}`;
  }
  function drawTypePillColor(dt) {
    return DRAW_TYPE_COLORS[dt.toLowerCase()] || PC.copper;
  }

  function renderList() {
    const container = $("#rows");
    container.innerHTML = "";

    if (state.filtered.length === 0) {
      container.innerHTML = `<div class="empty">No items match</div>`;
      updateCount();
      return;
    }

    const grouped = state.sortCol === "phase";
    const frag = document.createDocumentFragment();
    let lastPhase = null;

    if (state.filterArea) {
      const d = document.createElement("div");
      d.className = "phase-divider";
      const n = String(state.filtered.length).padStart(2,"0");
      d.innerHTML = `<span>Area: ${escapeHTML(state.filterArea)} <span style="color:var(--muted);font-weight:400">${n} items</span></span><span class="r" style="cursor:pointer" id="area-filter-clear" title="Clear filter">✕ clear</span>`;
      frag.appendChild(d);
    }
    if (state.filterType) {
      const d = document.createElement("div");
      d.className = "phase-divider";
      const n = String(state.filtered.length).padStart(2,"0");
      const mark = typeMark(state.filterType);
      d.innerHTML = `<span>${mark ? `<span class="tmark" data-type="${escapeHTML(mark)}" style="margin-right:6px">${escapeHTML(mark)}</span>` : ""}${escapeHTML(state.filterType)} <span style="color:var(--muted);font-weight:400">${n} items</span></span><span class="r" style="cursor:pointer" id="type-filter-clear" title="Clear filter">✕ clear</span>`;
      frag.appendChild(d);
    }
    if (state.filterDrawType) {
      const d = document.createElement("div");
      d.className = "phase-divider";
      const n = String(state.filtered.length).padStart(2,"0");
      d.innerHTML = `<span>Drawing type: ${escapeHTML(state.filterDrawType)} <span style="color:var(--muted);font-weight:400">${n} items</span></span><span class="r" style="cursor:pointer" id="drawtype-filter-clear" title="Clear filter">✕ clear</span>`;
      frag.appendChild(d);
    }

    state.filtered.forEach(it => {
      if (grouped && it.phase !== lastPhase) {
        lastPhase = it.phase;
        const count = state.filtered.filter(x => x.phase === lastPhase).length;
        const d = document.createElement("div");
        d.className = "phase-divider";
        d.innerHTML = `<span>${escapeHTML(lastPhase || "—")}</span><span class="r">${String(count).padStart(2,"0")} items</span>`;
        frag.appendChild(d);
      }
      const row = document.createElement("div");
      row.className = "row" + (it.id === state.selectedId ? " sel" : "");
      row.dataset.id = it.id;
      const tmark = typeMark(it.itemType);
      row.innerHTML = `
        <span class="archid">${tmark ? `<span class="tmark" data-type="${escapeHTML(tmark)}" title="${escapeHTML(it.itemType)}">${tmark}</span>` : ""}${displayId(it.id)}</span>
        <div class="title-wrap">
          <div class="title">${escapeHTML(it.title)}</div>
          <div class="ph">${escapeHTML(it.phase || "")}</div>

        <span class="year">${escapeHTML(yearOf(it.date))}</span>

      frag.appendChild(row);
    });
    container.appendChild(frag);

    const clearBtn = document.getElementById("area-filter-clear");
    if (clearBtn) {
      clearBtn.addEventListener("click", e => {
        e.stopPropagation();
        state.filterArea = "";
        applyFilters(); renderList();
      });
    }
    const clearTypeBtn = document.getElementById("type-filter-clear");
    if (clearTypeBtn) {
      clearTypeBtn.addEventListener("click", e => {
        e.stopPropagation();
        state.filterType = "";
        applyFilters(); renderList();
      });
    }
    const clearDrawTypeBtn = document.getElementById("drawtype-filter-clear");
    if (clearDrawTypeBtn) {
      clearDrawTypeBtn.addEventListener("click", e => {
        e.stopPropagation();
        state.filterDrawType = "";
        applyFilters(); renderList();
      });
    }

    const fleuron = document.createElement("div");
    fleuron.className = "list-fleuron";
    fleuron.innerHTML = `<img src="assets/hunter-mark.png" alt="" width="60" height="60">`;
    container.appendChild(fleuron);

    updateCount();
  }

  function updateCount() {
    const total   = state.items.length;
    const showing = state.filtered.length;
    const el = $("#count-display");
    const lb = $("#count-label");
    if (!el) return;
    el.textContent = String(showing).padStart(2, "0");

    if (total > 0) $("#topright").textContent = `v0.6`;

  // ── Image pane (pan + zoom) ───────────────────────────────────────────────
  let currentImg = null;
  let zoomState = { scale:1, fitScale:1, tx:0, ty:0, naturalW:0, naturalH:0 };

  function renderImage(item) {
    const canvas = $("#canvas");
    const idx = state.filtered.findIndex(i => i.id === item.id);

    $("#ih-id").textContent = (item.id || "").replace(/^HH-/, "");
    $("#if-date").textContent = item.date || "—";

    $("#nav-prev").classList.toggle("disabled", idx <= 0);
    $("#nav-next").classList.toggle("disabled", idx < 0 || idx >= state.filtered.length - 1);

    const url = imageUrl(item);
    canvas.innerHTML = "";
    if (url) {
      const full = $("#if-full");
      full.href = item.master || url;
      full.style.visibility = item.master ? "" : "hidden";

      const img = new Image();
      img.alt = item.title;
      img.draggable = false;
      img.onload = () => {
        zoomState.naturalW = img.naturalWidth;
        zoomState.naturalH = img.naturalHeight;
        currentImg = img;
        canvas.appendChild(img);
        fitToFrame();
        canvas.classList.remove("no-zoom");
      };
      img.onerror = () => {
        canvas.innerHTML = `<div class="placeholder">Preview failed<b>${displayId(item.id)}</b></div>`;
        currentImg = null;
        canvas.classList.add("no-zoom");
      };
      img.src = url;
    } else {
      canvas.innerHTML = `<div class="placeholder">No image yet<b>${displayId(item.id)}</b></div>`;
      $("#if-full").style.visibility = "hidden";
      currentImg = null;
      canvas.classList.add("no-zoom");
    }
  }

  function fitToFrame() {
    if (!currentImg) return;
    const stage = $("#stage");
    const sw = stage.clientWidth, sh = stage.clientHeight;
    const iw = zoomState.naturalW, ih = zoomState.naturalH;
    if (!iw || !ih) return;
    const pad = 40;
    const fit = Math.min((sw - pad*2) / iw, (sh - pad*2) / ih, 1);
    zoomState.fitScale = fit;
    zoomState.scale = fit;
    zoomState.tx = 0; zoomState.ty = 0;
    applyTransform(); updateZoomUI();
  }

  function applyTransform() {
    if (!currentImg) return;
    const z = zoomState;
    currentImg.style.transform =
      `translate(${-z.naturalW*z.scale/2 + z.tx}px, ${-z.naturalH*z.scale/2 + z.ty}px) scale(${z.scale})`;
  }

  function updateZoomUI() {
    const pct = Math.round((zoomState.scale / zoomState.fitScale) * 100);
    $("#zoom-pct").textContent = pct + "%";
    $("#zoom-out").disabled = zoomState.scale <= zoomState.fitScale * 0.5;
    $("#zoom-in").disabled  = zoomState.scale >= zoomState.fitScale * 8;
  }

  function setZoom(newScale, cx, cy) {
    if (!currentImg) return;
    const z = zoomState;
    const minS = z.fitScale * 0.5, maxS = z.fitScale * 8;
    const clamped = Math.max(minS, Math.min(maxS, newScale));
    const stage = $("#stage");
    if (cx == null || cy == null) { cx = stage.clientWidth/2; cy = stage.clientHeight/2; }
    const centerX = stage.clientWidth/2, centerY = stage.clientHeight/2;
    const imgX = ((cx - centerX) - z.tx) / z.scale;
    const imgY = ((cy - centerY) - z.ty) / z.scale;
    z.scale = clamped;
    z.tx = (cx - centerX) - imgX * clamped;
    z.ty = (cy - centerY) - imgY * clamped;
    constrainPan(); applyTransform(); updateZoomUI();
  }

  function constrainPan() {
    const z = zoomState;
    const stage = $("#stage");
    const sw = stage.clientWidth, sh = stage.clientHeight;
    const iw = z.naturalW * z.scale, ih = z.naturalH * z.scale;
    if (iw <= sw) { z.tx = 0; } else { const m = (iw-sw)/2; z.tx = Math.max(-m, Math.min(m, z.tx)); }
    if (ih <= sh) { z.ty = 0; } else { const m = (ih-sh)/2; z.ty = Math.max(-m, Math.min(m, z.ty)); }
  }

  function initPanZoom() {
    const canvas = $("#canvas"), stage = $("#stage");
    let pan = { active:false, startX:0, startY:0, startTx:0, startTy:0 };

    canvas.addEventListener("mousedown", e => {
      if (!currentImg || e.button !== 0) return;
      pan = { active:true, startX:e.clientX, startY:e.clientY, startTx:zoomState.tx, startTy:zoomState.ty };
      canvas.classList.add("grabbing"); e.preventDefault();
    });
    window.addEventListener("mousemove", e => {
      if (!pan.active) return;
      zoomState.tx = pan.startTx + (e.clientX - pan.startX);
      zoomState.ty = pan.startTy + (e.clientY - pan.startY);
      constrainPan(); applyTransform();
    });
    window.addEventListener("mouseup", () => { pan.active = false; canvas.classList.remove("grabbing"); });

    stage.addEventListener("wheel", e => {
      if (!currentImg) return;
      e.preventDefault();
      const rect = stage.getBoundingClientRect();
      setZoom(zoomState.scale * (e.deltaY < 0 ? 1.12 : 0.89), e.clientX - rect.left, e.clientY - rect.top);
    }, { passive:false });

    canvas.addEventListener("dblclick", () => { if (currentImg) fitToFrame(); });
    $("#zoom-in").addEventListener("click",  () => setZoom(zoomState.scale * 1.4));
    $("#zoom-out").addEventListener("click", () => setZoom(zoomState.scale * 0.71));
    $("#zoom-fit").addEventListener("click", fitToFrame);

    let resizeT;
    window.addEventListener("resize", () => { clearTimeout(resizeT); resizeT = setTimeout(fitToFrame, 120); });
  }

  // ── Meta pane ─────────────────────────────────────────────────────────────
  function renderMeta(item) {
    const body = $("#meta-body");
    $("#meta-source").textContent = item.sourceCollection || "—";

    const areasHtml = (item.areas || []).map(a =>
      `<button class="pill area-pill${state.filterArea === a ? " active" : ""}" style="${pillStyle(PC.copper)}" data-area="${escapeHTML(a)}">${escapeHTML(a)}</button>`
    ).join("");

    const descRows = [];
    if (item.date)        descRows.push(["Date",    escapeHTML(item.date)]);
    if (item.phase) {
      const pos = item.setPosition ? ` <span style="color:var(--muted);font-family:var(--mono);font-size:10px;margin-left:4px">${escapeHTML(item.setPosition)}</span>` : "";
      descRows.push(["Phase", escapeHTML(item.phase) + pos]);
    }
    if (areasHtml)        descRows.push(["Areas",   areasHtml]);
    if (item.itemType) {
      const mark = typeMark(item.itemType);
      const isActive = state.filterType === item.itemType;
      const tc = TYPE_PILL_COLORS[mark] || TYPE_PILL_COLORS["D"];
      descRows.push(["Item type",
        `<button class="pill type-pill${isActive ? " active" : ""}" style="${pillStyle(tc)}" data-itype="${escapeHTML(item.itemType)}">${escapeHTML(item.itemType)}</button>`
      ]);
    }
    if (item.drawTypes?.length) {
      const drawHtml = sortDrawTypes(item.drawTypes).map(dt =>
        `<button class="pill drawtype-pill${state.filterDrawType === dt ? " active" : ""}" style="${pillStyle(drawTypePillColor(dt))}" data-drawtype="${escapeHTML(dt)}">${escapeHTML(dt)}</button>`
      ).join("");
      descRows.push(["Drawing type", drawHtml]);
    }
    if (item.medium)       descRows.push(["Medium",  escapeHTML(item.medium)]);
    if (item.builtStatus) descRows.push(["Built",   escapeHTML(item.builtStatus)]);
    if (item.creator)     descRows.push(["Creator", escapeHTML(item.creator)]);
    if (item.heldBy)      descRows.push(["Held by", escapeHTML(item.heldBy)]);

    const archRows = [];
    if (item.notes)    archRows.push([notesLabel(item), formatNotes(item.notes)]);
    if (item.rights) {
      const abbrev = archiveAbbrev(item.heldBy);
      const contact = abbrev === "CAA"
        ? "Contact for permissions."
        : "Contact the Hunter House Foundation.";
      archRows.push(["Rights", `${escapeHTML(item.rights)}<span class="rights-note">${escapeHTML(contact)}</span>`]);
    }
    if (item.archiveLink) archRows.push(["Finding aid", `<a href="${escapeHTML(item.archiveLink)}" target="_blank" rel="noopener">${archiveLinkLabel(item.heldBy)}</a>`]);

    const descHTML = descRows.map(([k,v]) => `<div class="row"><dt>${k}</dt><dd>${v}</dd></div>`).join("");
    const archHTML = archRows.map(([k,v]) => `<div class="row"><dt>${k}</dt><dd>${v}</dd></div>`).join("");

    const phaseLabel = item.phase || null;
    const workLabel  = "Hunter Residence";

    const siblings = phaseLabel
      ? state.items
          .filter(i => i.phase === phaseLabel)
          .sort((a, b) => {
            const ap = parseInt(a.setPosition) || 999;
            const bp = parseInt(b.setPosition) || 999;
            return ap !== bp ? ap - bp : (a.date||"").localeCompare(b.date||"");
          })
      : [];

    const wikibaseUrl = item.qid
      ? `https://hunterhouse.wikibase.cloud/wiki/Item:${item.qid}`
      : "#";
    const sparqlQ = `SELECT ?prop ?propLabel ?value ?valueLabel WHERE {\n  <https://hunterhouse.wikibase.cloud/entity/${item.qid||"Q0"}> ?p ?value .\n  ?prop wikibase:directClaim ?p .\n  SERVICE wikibase:label { bd:serviceParam wikibase:language "en" }\n}`;
    const sparqlUrl = `https://hunterhouse.wikibase.cloud/query/#${encodeURIComponent(sparqlQ)}`;
    const jsonUrl   = item.qid
      ? `https://hunterhouse.wikibase.cloud/w/api.php?action=wbgetentities&ids=${item.qid}&format=json`
      : "#";

    let graphPathHTML = "";
    if (phaseLabel) {
      graphPathHTML = `
        <div class="node this">
          <span class="tick">●</span><span class="rel">This</span>
          <span class="lbl">${escapeHTML(item.title)}</span>
        </div>
        <div class="connector"></div>
        <div class="node">
          <span class="tick">↑</span><span class="rel">part of</span>
          <span class="lbl">${escapeHTML(phaseLabel)}</span>
        </div>
        <div class="connector"></div>
        <div class="node">
          <span class="tick">↑</span><span class="rel">part of</span>
          <span class="lbl" style="color:var(--muted);font-weight:400">${escapeHTML(workLabel)}</span>
        </div>`;
    } else {
      graphPathHTML = `<div class="graph-empty">No phase assigned. Item not yet linked into work hierarchy.</div>`;
    }

    let siblingsHTML = "";
    if (siblings.length > 1) {
      const rows = siblings.map(s => {
        const isCurrent = s.id === item.id;
        const pos = s.setPosition ? s.setPosition.split(" of ")[0] : "—";
        return `<a class="sib${isCurrent ? " current" : ""}" ${isCurrent ? "" : `data-sib-id="${escapeHTML(s.id)}"`}>
          <span class="id">${displayId(s.id)}</span>
          <span class="t">${escapeHTML(s.title)}</span>
          <span class="pos">${escapeHTML(pos)}</span>
        </a>`;
      }).join("");
      siblingsHTML = `
        <div class="graph-siblings">
          <div class="lbl-row"><span>In this set</span><span class="ct">${siblings.length} total</span></div>
          ${rows}
        </div>`;
    }

    const hasQID = !!item.qid;
    const graphActionsHTML = `
      <div class="graph-actions">
        <a href="${escapeHTML(wikibaseUrl)}" ${hasQID ? `target="_blank" rel="noopener"` : `onclick="return false" style="opacity:0.55"`}>
          <span class="top">Structured</span>
          <span class="bot">Wikibase <span class="ar">↗</span></span>
        </a>
        <a href="${escapeHTML(sparqlUrl)}" ${hasQID ? `target="_blank" rel="noopener"` : `onclick="return false" style="opacity:0.55"`}>
          <span class="top">Graph query</span>
          <span class="bot">SPARQL <span class="ar">↗</span></span>
        </a>
        <a href="${escapeHTML(jsonUrl)}" ${hasQID ? `target="_blank" rel="noopener"` : `onclick="return false" style="opacity:0.55"`}>
          <span class="top">Raw</span>
          <span class="bot">JSON <span class="ar">↗</span></span>
        </a>
      </div>`;

    const cite   = buildCitation(item);
    const graphN = archRows.length > 0 ? "04" : "03";
    body.innerHTML = `
      <h1 class="meta-title">${formatTitle(item.title)}</h1>

      <section class="meta-section">
        <h3><span><span class="n">01</span>Description</span><span class="ct">${descRows.length} fields</span></h3>
        <dl class="kv">${descHTML}</dl>
      </section>

      <section class="meta-section">
        <h3><span><span class="n">02</span>Citation</span></h3>
        <div class="cite-box">
          <p>${escapeHTML(cite)}</p>
          <button class="cite-copy" data-cite="${escapeHTML(cite)}" onclick="navigator.clipboard.writeText(this.dataset.cite).then(()=>{this.textContent='Copied';setTimeout(()=>this.textContent='Copy',1500)})">Copy</button>
        </div>
      </section>

      ${archRows.length > 0 ? `<section class="meta-section">
        <h3><span><span class="n">03</span>Archival</span><span class="ct">${archRows.length} fields</span></h3>
        <dl class="kv">${archHTML}</dl>
      </section>` : ""}
      <section class="graph-section">
        <h3><span><span class="n">${graphN}</span>In the graph</span><span class="ct">Wikibase context</span></h3>
        <div class="graph-path">${graphPathHTML}</div>
        ${siblingsHTML}
        ${graphActionsHTML}
      </section>
    `;

    body.querySelectorAll(".sib[data-sib-id]").forEach(el => {
      el.addEventListener("click", e => { e.preventDefault(); selectItem(el.dataset.sibId); });
    });
  }

  // ── Selection ─────────────────────────────────────────────────────────────
  function selectItem(id, opts = {}) {
    if (!id) return;
    if (window.matchMedia("(max-width:767px)").matches) switchMobileTab("image");
    state.selectedId = id;
    const item = state.items.find(i => i.id === id);
    if (!item) return;

    document.querySelectorAll(".row.sel").forEach(r => r.classList.remove("sel"));
    const row = document.querySelector(`.row[data-id="${CSS.escape(id)}"]`);
    if (row) {
      row.classList.add("sel");
      if (opts.scrollIntoView !== false) {
        const container = $("#rows");
        const rect = row.getBoundingClientRect(), crect = container.getBoundingClientRect();
        if (rect.top < crect.top || rect.bottom > crect.bottom) row.scrollIntoView({ block:"nearest" });
      }
    }

    renderImage(item);
    renderMeta(item);

    const url = new URL(location.href);
    url.searchParams.set("id", id);
    history.replaceState({}, "", url);
  }

  function selectAdjacent(delta) {
    const idx = state.filtered.findIndex(i => i.id === state.selectedId);
    const next = idx + delta;
    if (next >= 0 && next < state.filtered.length) selectItem(state.filtered[next].id);
  }

  // ── Legend button helper ──────────────────────────────────────────────────
  function addLegendButton(targetEl, legendData) {
    const btn = document.createElement("button");
    btn.className = "legend-btn";
    btn.type = "button";
    btn.textContent = "?";

    const pop = document.createElement("div");
    pop.className = "legend-pop";
    pop.hidden = true;
    pop.innerHTML = legendData.map(([code, label]) =>
      `<div class="leg-row"><span class="leg-code">${escapeHTML(code)}</span><span class="leg-label">${escapeHTML(label)}</span></div>`
    ).join("");

    btn.addEventListener("click", e => {
      e.stopPropagation();
      const isHidden = pop.hidden;
      document.querySelectorAll(".legend-pop").forEach(p => { p.hidden = true; });
      pop.hidden = !isHidden;
    });

    targetEl.prepend(pop);
    targetEl.prepend(btn);
  }

  // ── Controls ──────────────────────────────────────────────────────────────
  function closeAllDropdowns() {
    document.querySelectorAll(".fbtn.open").forEach(b => b.classList.remove("open"));
    document.querySelectorAll(".legend-pop").forEach(p => { p.hidden = true; });
  }

  function wireDropdown(btnId, dropId, valId, getOptions, getActive, onChange) {
    const btnEl = $(btnId);
    const dropEl = $(dropId);
    const valEl  = $(valId);

    btnEl.addEventListener("click", e => {
      e.stopPropagation();
      const isOpen = btnEl.classList.contains("open");
      closeAllDropdowns();
      if (!isOpen) {
        const options = getOptions();
        const active = getActive();
        dropEl.innerHTML = options.map(opt =>
          `<li data-val="${escapeHTML(opt.value ?? "")}" class="${!opt.value ? "all " : ""}${opt.value === active ? "sel" : ""}">${escapeHTML(opt.label)}</li>`
        ).join("");
        btnEl.classList.add("open");
      }
    });

    dropEl.addEventListener("click", e => {
      const li = e.target.closest("li");
      if (!li) return;
      const val = li.dataset.val || null;
      closeAllDropdowns();
      onChange(val);
    });
  }

  function wireControls() {
    $("#search-input").addEventListener("input", e => {
      state.search = e.target.value;
      applyFilters(); renderList();
      if (!state.filtered.find(i => i.id === state.selectedId) && state.filtered.length) {
        selectItem(state.filtered[0].id, { scrollIntoView:false });
      }
    });

    document.addEventListener("click", closeAllDropdowns);

    // Column-header sort
    document.querySelectorAll(".sort-hd[data-sort-col]").forEach(btn => {
      btn.addEventListener("click", () => {
        const col = btn.dataset.sortCol;
        if (state.sortCol === col) {
          state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
        } else {
          state.sortCol = col;
          state.sortDir = "asc";
        }
        renderListHead();
        applyFilters();
        renderList();
        const url = new URL(location.href);
        url.searchParams.set("sort", state.sortCol);
        url.searchParams.set("dir",  state.sortDir);
        history.replaceState({}, "", url);
      });
    });

    // Mobile tabs
    document.querySelectorAll(".mtab").forEach(tab => {
      tab.addEventListener("click", () => switchMobileTab(tab.dataset.pane));
    });


    $("#rows").addEventListener("click", e => {
      const row = e.target.closest(".row");
      if (row && row.dataset.id) selectItem(row.dataset.id);
    });

    document.getElementById("meta-body").addEventListener("click", e => {
      const areaPill = e.target.closest(".area-pill");
      if (areaPill) {
        const area = areaPill.dataset.area;
        state.filterArea = state.filterArea === area ? "" : area;
        applyFilters(); renderList();
        if (state.filtered.length && !state.filtered.find(i => i.id === state.selectedId))
          selectItem(state.filtered[0].id, { scrollIntoView: false });
        return;
      }
      const typePill = e.target.closest(".type-pill");
      if (typePill) {
        const itype = typePill.dataset.itype;
        state.filterType = state.filterType === itype ? "" : itype;
        applyFilters(); renderList();
        if (state.filtered.length && !state.filtered.find(i => i.id === state.selectedId))
          selectItem(state.filtered[0].id, { scrollIntoView: false });
        return;
      }
      const drawTypePill = e.target.closest(".drawtype-pill");
      if (drawTypePill) {
        const dt = drawTypePill.dataset.drawtype;
        state.filterDrawType = state.filterDrawType === dt ? "" : dt;
        applyFilters(); renderList();
        if (state.filtered.length && !state.filtered.find(i => i.id === state.selectedId))
          selectItem(state.filtered[0].id, { scrollIntoView: false });
      }
    });

    $("#nav-prev").addEventListener("click", e => { e.preventDefault(); selectAdjacent(-1); });
    $("#nav-next").addEventListener("click", e => { e.preventDefault(); selectAdjacent(+1); });

    document.addEventListener("keydown", e => {
      const inInput = e.target.matches("input, select, textarea");
      if (e.key === "/" && !inInput) { e.preventDefault(); $("#search-input").focus(); return; }
      if (e.key === "Escape" && inInput) { e.target.blur(); return; }
      if (e.key === "Escape") { closeAllDropdowns(); return; }
      if (e.key === "ArrowDown" && !inInput) { e.preventDefault(); selectAdjacent(+1); }
      if (e.key === "ArrowUp"   && !inInput) { e.preventDefault(); selectAdjacent(-1); }
      if (e.key === "Enter"     && !inInput && state.selectedId) {
        e.preventDefault();
        window.open(`item.html?id=${encodeURIComponent(state.selectedId)}`, "_blank");
      }
    });
  }

  // ── Main (async load) ─────────────────────────────────────────────────────
  (async function main() {
    document.getElementById("topright").addEventListener("dblclick", () => {
      clearCache();
      location.reload();
    });

    try {
      const items = await loadFromWikibase();
      if (!items.length) {
        $("#rows").innerHTML = `<div class="load-msg">No items with images found in Wikibase.</div>`;
        return;
      }

      state.items = items;

      const params  = new URLSearchParams(location.search);
      const urlSort = params.get("sort");
      const urlDir  = params.get("dir");
      const urlId   = params.get("id");

      if (urlSort && ["id","phase","year"].includes(urlSort)) state.sortCol = urlSort;
      if (urlDir  && ["asc","desc"].includes(urlDir))         state.sortDir = urlDir;

      applyFilters();
      renderList();
      wireControls();
      renderListHead();
      initPanZoom();

      addLegendButton($(".list-head .id-col"), BADGE_LEGEND);

      const defaultItem = state.filtered.find(i => i.qid === "Q331") || state.filtered[0];
      const target = urlId && state.filtered.find(i => i.id === urlId)
        ? urlId
        : defaultItem?.id;
      if (target) selectItem(target, { scrollIntoView: !!urlId });

    } catch (err) {
      console.error(err);
      $("#rows").innerHTML = `<div class="error-msg">Error loading: ${escapeHTML(err.message)}</div>`;
    }
  })();
</script>

</body>
</html>

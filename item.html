<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Item — Hunter House Archive</title>
<meta name="viewport" content="width=1400">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/verso.css">
<style>
  /* ── status ── */
  .status{
    background:var(--paper);border:1px solid var(--rule);padding:12px 18px;margin-bottom:24px;
    font-size:12px;color:var(--muted);font-family:var(--mono);letter-spacing:0.04em;
  }
  .status.error{background:var(--red-pale);color:var(--red-deep);border-color:var(--red-pale)}

  /* ── item card ── */
  .item{background:var(--paper);border:1px solid var(--rule)}
  .item-header{padding:20px 24px 16px;border-bottom:1px solid var(--ink);background:var(--bg)}
  .item-header .qid{
    color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;
    margin-bottom:6px;
  }
  .item-header .label{
    font-size:32px;font-weight:500;margin:0 0 8px;letter-spacing:-0.02em;line-height:1.1;color:var(--ink);
  }
  .item-header .desc{color:var(--muted);font-size:15px;line-height:1.55;letter-spacing:-0.005em}
  .item-header .aliases{margin-top:10px;color:var(--muted);font-size:12px}
  .item-header .aliases-label{font-style:italic;margin-right:4px}
  .item-header .aliases span.alias{
    background:var(--soft);padding:1px 7px;margin-right:4px;
    font-style:normal;display:inline-block;margin-top:2px;
    font-family:var(--mono);font-size:11px;letter-spacing:0.02em;
  }

  /* ── statements ── */
  .statements{padding:16px 24px 24px}
  .section-heading{
    font-family:var(--mono);font-size:10px;color:var(--ink);letter-spacing:0.22em;text-transform:uppercase;
    font-weight:500;padding-bottom:8px;border-bottom:1px solid var(--ink);margin:28px 0 0;
  }
  .section-heading:first-child{margin-top:6px}

  .stmt{
    display:grid;grid-template-columns:200px 1fr;gap:14px;
    padding:10px 0;border-bottom:1px solid var(--rule-soft);
  }
  .stmt:last-child{border-bottom:none}
  .prop{color:var(--muted);font-size:12.5px;font-weight:400;font-family:var(--mono);letter-spacing:0.02em;padding-top:2px}
  .val{font-size:13.5px;word-break:break-word;letter-spacing:-0.005em}
  .val .qlink{color:var(--copper-deep);text-decoration:none;border-bottom:1px solid var(--copper-pale)}
  .val .qlink:hover{border-bottom-color:var(--copper-deep)}
  .val .stringval{font-family:var(--mono);font-size:12.5px;color:var(--ink)}
  .val .multival{display:block;padding:2px 0}
  .val .external{color:var(--copper-deep);text-decoration:none;border-bottom:1px solid var(--copper-pale)}
  .qual{display:block;margin-top:4px;margin-left:14px;font-size:12px;color:var(--muted)}
  .qual::before{content:"↳ ";color:var(--hint)}
  .qual b{font-weight:500;color:var(--muted)}

  /* ── reverse references ── */
  .reverse{background:var(--paper);padding:16px 24px 20px;border-top:1px solid var(--rule);font-size:13px}
  .reverse h3{
    font-family:var(--mono);font-size:10px;color:var(--ink);letter-spacing:0.22em;text-transform:uppercase;
    font-weight:500;margin:0 0 14px;
  }
  .reverse .count{color:var(--ink);margin-bottom:4px;font-size:13.5px}
  .reverse .count a{color:var(--copper-deep);text-decoration:none;border-bottom:1px solid var(--copper-pale)}
  .reverse .empty-rev{color:var(--muted);font-size:12.5px;font-style:italic}

  /* ── footer meta ── */
  .footer-meta{
    margin-top:24px;padding-top:16px;border-top:1px dotted var(--rule);
    font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.04em;
  }
  .footer-meta a{color:var(--copper-deep);text-decoration:none;border-bottom:1px solid var(--copper-pale)}

  @media(max-width:640px){
    .stmt{grid-template-columns:1fr;gap:4px}
    .prop{font-size:10.5px;text-transform:uppercase;letter-spacing:0.08em}
    .item-header .label{font-size:24px}
  }
</style>
</head>
<body>

<header class="site-top">
  <div class="markid">
    <span class="h">HH</span>
    <span class="name">Hunter House <span class="dim">· Foundation</span></span>
  </div>
  <nav class="site-nav">
    <a href="the-house.html">House</a>
    <a href="archive.html">Archive</a>
    <a href="browse.html" class="on">Browse</a>
    <a href="richard-hunter.html">Hunter</a>
    <a href="about.html">About</a>
  </nav>
  <div class="site-topright">v0.4</div>
</header>

<div class="crumbs">
  <div class="path">
    <a href="browse.html">← Browse</a>
    <span class="sep">/</span>
    <span id="crumb-label">Item</span>
  </div>
  <div class="right" id="crumb-right"></div>
</div>

<div class="frame">

  <div id="status" class="status">Loading item…</div>

  <article id="item" class="item" style="display:none;">
    <div class="item-header">
      <div class="qid" id="qid"></div>
      <div class="label" id="label"></div>
      <div class="desc" id="desc"></div>
      <div class="aliases" id="aliases" style="display:none;"></div>
    </div>
    <div class="statements" id="statements"></div>
    <div class="reverse" id="reverse"></div>
  </article>

  <div class="footer-meta" id="footer-meta" style="display:none;"></div>

  <footer class="colophon" style="margin-top:48px">
    <div class="l"><b>Hunter House Foundation</b> · Item record</div>
    <div class="c"><a href="https://hunterhouse.wikibase.cloud" target="_blank" rel="noopener">hunterhouse.wikibase.cloud</a></div>
    <div class="r"><a href="browse.html">← Back to browse</a></div>
  </footer>

</div>

<script>
  // ---------------------------------------------------------------------
  // Configuration
  // ---------------------------------------------------------------------
  const WIKIBASE_URL = "https://hunterhouse.wikibase.cloud";
  const API_URL = WIKIBASE_URL + "/w/api.php";
  const SPARQL_URL = WIKIBASE_URL + "/query/sparql";

  // Section grouping. Property labels are matched (case-insensitive) and the
  // matching statements go under that heading. Anything unmatched ends up in
  // "Other". This is a pragmatic first pass — refine as the property
  // vocabulary stabilizes.
  const SECTIONS = [
    { name: "Identity",        keys: ["instance of", "label", "title", "subclass of", "type"] },
    { name: "People",          keys: ["architect", "client", "creator", "participant", "founder", "director", "original architect", "presenter", "organizer"] },
    { name: "Locative",        keys: ["location", "located in", "headquarters", "street address", "coordinate location", "venue", "area of", "part of area", "contains area"] },
    { name: "Temporal",        keys: ["start date", "end date", "point in time", "built date", "removed date", "founded", "dissolved", "demolished date", "date of design", "date of construction"] },
    { name: "Phase / Work",    keys: ["part of", "has phase", "addition to", "based on", "phase type", "area type", "construction status", "realization status", "project status", "built in phase", "modified in phase", "removed in phase"] },
    { name: "Source",          keys: ["source collection", "custodian", "parent collection", "fonds reference", "finding aid url", "subject of", "features", "documents"] },
    { name: "Identifiers",     keys: ["hh archive id", "caa archive reference", "wikidata id", "geonames id", "isil", "official website"] },
  ];

  // ---------------------------------------------------------------------
  // Helpers
  // ---------------------------------------------------------------------
  function escapeHTML(s) {
    if (s == null) return "";
    return String(s).replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  function setStatus(msg, cls) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = "status" + (cls ? " " + cls : "");
  }

  function getQID() {
    const params = new URLSearchParams(window.location.search);
    return params.get("id");
  }

  async function fetchEntity(qid) {
    const url = API_URL +
      "?action=wbgetentities" +
      "&ids=" + encodeURIComponent(qid) +
      "&languages=en" +
      "&format=json" +
      "&origin=*";
    const res = await fetch(url);
    if (!res.ok) throw new Error("API " + res.status + " " + res.statusText);
    const json = await res.json();
    if (json.error) throw new Error(json.error.info || json.error.code);
    return json.entities[qid];
  }

  // Resolve a batch of entity IDs (mix of Q-IDs and P-IDs) to their labels.
  async function fetchLabels(ids) {
    if (ids.length === 0) return {};
    const unique = [...new Set(ids)];
    const labels = {};
    // wbgetentities accepts max 50 ids per call.
    for (let i = 0; i < unique.length; i += 50) {
      const batch = unique.slice(i, i + 50);
      const url = API_URL +
        "?action=wbgetentities" +
        "&ids=" + encodeURIComponent(batch.join("|")) +
        "&languages=en" +
        "&props=labels" +
        "&format=json" +
        "&origin=*";
      const res = await fetch(url);
      if (!res.ok) continue;
      const json = await res.json();
      if (!json.entities) continue;
      for (const id of batch) {
        const e = json.entities[id];
        if (e && e.labels && e.labels.en) {
          labels[id] = e.labels.en.value;
        }
      }
    }
    return labels;
  }

  // ---------------------------------------------------------------------
  // Formatting datavalues
  // ---------------------------------------------------------------------
  function formatValue(dv, labels) {
    if (!dv) return "";
    const t = dv.type;
    const v = dv.value;
    if (t === "wikibase-entityid") {
      const id = v.id;
      const label = labels[id] || id;
      // Q-items link to item.html; P-properties don't link for now.
      if (id.startsWith("Q")) {
        return `<a class="qlink" href="item.html?id=${encodeURIComponent(id)}">${escapeHTML(label)}</a> <span style="color:var(--hint);font-family:var(--mono);font-size:11px;">(${escapeHTML(id)})</span>`;
      }
      return escapeHTML(label) + ` <span style="color:var(--hint);font-family:var(--mono);font-size:11px;">(${escapeHTML(id)})</span>`;
    }
    if (t === "string") {
      return `<span class="stringval">${escapeHTML(v)}</span>`;
    }
    if (t === "monolingualtext") {
      return escapeHTML(v.text) + ` <span style="color:var(--hint);font-size:11px;">(${escapeHTML(v.language)})</span>`;
    }
    if (t === "time") {
      // v.time looks like "+2026-04-15T00:00:00Z"; precision 9=year, 10=month, 11=day.
      const isoIsh = v.time.replace(/^\+/, "");
      const date = isoIsh.split("T")[0];
      const [y, m, d] = date.split("-");
      let display = y;
      if (v.precision >= 10) display = `${y}-${m}`;
      if (v.precision >= 11) display = `${y}-${m}-${d}`;
      return `<span class="stringval">${escapeHTML(display)}</span>`;
    }
    if (t === "quantity") {
      return `<span class="stringval">${escapeHTML(v.amount.replace(/^\+/, ""))}</span>`;
    }
    if (t === "globecoordinate") {
      return `<span class="stringval">${v.latitude.toFixed(4)}, ${v.longitude.toFixed(4)}</span>`;
    }
    if (t === "url" || (typeof v === "string" && /^https?:\/\//.test(v))) {
      const u = typeof v === "string" ? v : v.toString();
      return `<a class="external" href="${escapeHTML(u)}" target="_blank" rel="noopener">${escapeHTML(u)}</a>`;
    }
    return `<span class="stringval">${escapeHTML(JSON.stringify(v))}</span>`;
  }

  // ---------------------------------------------------------------------
  // Reverse references: SPARQL for "what points at this item"
  // ---------------------------------------------------------------------
  async function fetchReverseRefs(qid) {
    const entityURI = WIKIBASE_URL + "/entity/" + qid;
    const q = `
      SELECT ?prop ?propLabel (COUNT(?subject) AS ?count) WHERE {
        ?subject ?prop <${entityURI}> .
        ?propEntity <http://wikiba.se/ontology#directClaim> ?prop .
        OPTIONAL { ?propEntity rdfs:label ?propLabel . FILTER(LANG(?propLabel) = "en") }
      }
      GROUP BY ?prop ?propLabel
      ORDER BY DESC(?count)
    `;
    const url = SPARQL_URL + "?query=" + encodeURIComponent(q) + "&format=json";
    try {
      const res = await fetch(url, { headers: { Accept: "application/sparql-results+json" } });
      if (!res.ok) return [];
      const json = await res.json();
      return json.results.bindings.map(r => ({
        propURI: r.prop.value,
        propLabel: r.propLabel ? r.propLabel.value : r.prop.value.split("/").pop(),
        count: parseInt(r.count.value, 10),
      }));
    } catch (e) {
      console.warn("reverse refs query failed:", e);
      return [];
    }
  }

  // ---------------------------------------------------------------------
  // Render
  // ---------------------------------------------------------------------
  function renderHeader(entity) {
    const qid = entity.id;
    const label = entity.labels && entity.labels.en ? entity.labels.en.value : qid;
    const desc = entity.descriptions && entity.descriptions.en ? entity.descriptions.en.value : "";
    const aliases = entity.aliases && entity.aliases.en ? entity.aliases.en.map(a => a.value) : [];

    document.title = label + " — Hunter House Archive";
    document.getElementById("qid").textContent = qid + " · Item";
    document.getElementById("label").textContent = label;
    document.getElementById("desc").textContent = desc;

    // Update crumb
    const crumbLabel = document.getElementById("crumb-label");
    if (crumbLabel) crumbLabel.textContent = label || qid;

    if (aliases.length > 0) {
      const al = document.getElementById("aliases");
      al.style.display = "";
      al.innerHTML = `<span class="aliases-label">also known as:</span> ` +
        aliases.map(a => `<span class="alias">${escapeHTML(a)}</span>`).join("");
    }
  }

  function categorizeStatement(propLabel) {
    const lower = propLabel.toLowerCase();
    for (const section of SECTIONS) {
      if (section.keys.includes(lower)) return section.name;
    }
    return "Other";
  }

  function renderStatements(claims, propLabels, valueLabels) {
    const container = document.getElementById("statements");
    container.innerHTML = "";

    if (!claims || Object.keys(claims).length === 0) {
      container.innerHTML = `<div style="padding:20px 0;color:var(--muted);font-style:italic;">No statements yet.</div>`;
      return;
    }

    // Group claims by section
    const sections = {};
    for (const pid in claims) {
      const propLabel = propLabels[pid] || pid;
      const sectionName = categorizeStatement(propLabel);
      if (!sections[sectionName]) sections[sectionName] = [];
      sections[sectionName].push({ pid, propLabel, claims: claims[pid] });
    }

    // Render in canonical section order, then "Other" last
    const orderedNames = [...SECTIONS.map(s => s.name), "Other"];
    orderedNames.forEach(sectionName => {
      if (!sections[sectionName]) return;
      const heading = document.createElement("div");
      heading.className = "section-heading";
      heading.textContent = sectionName;
      container.appendChild(heading);

      sections[sectionName].forEach(({ pid, propLabel, claims }) => {
        const stmt = document.createElement("div");
        stmt.className = "stmt";

        const valuesHTML = claims.map(c => {
          if (!c.mainsnak || c.mainsnak.snaktype !== "value") return "";
          let html = `<span class="multival">${formatValue(c.mainsnak.datavalue, valueLabels)}</span>`;

          // Qualifiers
          if (c.qualifiers) {
            for (const qpid in c.qualifiers) {
              const qLabel = propLabels[qpid] || qpid;
              c.qualifiers[qpid].forEach(q => {
                if (q.snaktype !== "value") return;
                html += `<span class="qual"><b>${escapeHTML(qLabel)}:</b> ${formatValue(q.datavalue, valueLabels)}</span>`;
              });
            }
          }
          return html;
        }).join("");

        stmt.innerHTML = `
          <div class="prop">${escapeHTML(propLabel)} <span style="color:var(--hint);font-size:10px;">(${escapeHTML(pid)})</span></div>
          <div class="val">${valuesHTML}</div>
        `;
        container.appendChild(stmt);
      });
    });
  }

  function renderReverse(refs, qid) {
    const container = document.getElementById("reverse");
    container.innerHTML = `<h3>What links here</h3>`;
    if (refs.length === 0) {
      container.innerHTML += `<div class="empty-rev">Nothing in the Wikibase currently points at this item.</div>`;
      return;
    }
    const queryLink = SPARQL_URL.replace("/sparql", "/") +
      "#" + encodeURIComponent("SELECT ?subject ?subjectLabel WHERE {\n  ?subject ?prop <" + WIKIBASE_URL + "/entity/" + qid + "> .\n  SERVICE wikibase:label { bd:serviceParam wikibase:language \"en\". }\n}");
    refs.forEach(r => {
      const div = document.createElement("div");
      div.className = "count";
      div.innerHTML = `→ ${r.count} ${r.count === 1 ? "item" : "items"} <span style="color:var(--muted)">via</span> <span style="color:var(--ink);">${escapeHTML(r.propLabel)}</span>`;
      container.appendChild(div);
    });
    const note = document.createElement("div");
    note.style.cssText = "margin-top:10px;font-size:11px;color:var(--muted);font-family:var(--mono)";
    note.innerHTML = `Run a <a href="${queryLink}" target="_blank" rel="noopener">SPARQL query</a> to see the linking items.`;
    container.appendChild(note);
  }

  function renderFooter(qid, isCollection) {
    const fm = document.getElementById("footer-meta");
    fm.style.display = "";
    const findingAidLink = isCollection
      ? ` · <a href="collection.html?id=${encodeURIComponent(qid)}">View as finding aid →</a>`
      : "";
    fm.innerHTML = `
      <a href="${WIKIBASE_URL}/wiki/Item:${qid}" target="_blank" rel="noopener">${WIKIBASE_URL}/wiki/Item:${qid}</a>${findingAidLink}
    `;
  }

  // ---------------------------------------------------------------------
  // Main
  // ---------------------------------------------------------------------
  (async function main() {
    const qid = getQID();
    if (!qid) {
      setStatus("No item ID in URL. Open this page with ?id=Q1 (or any item ID).", "error");
      return;
    }

    try {
      const entity = await fetchEntity(qid);
      if (!entity || entity.missing !== undefined) {
        setStatus("Item " + qid + " not found in Wikibase.", "error");
        return;
      }

      renderHeader(entity);

      // Collect all the entity IDs we need to resolve labels for:
      // property IDs from claims, and entity IDs from values & qualifiers.
      const propIDs = new Set();
      const valueQIDs = new Set();
      const claims = entity.claims || {};
      for (const pid in claims) {
        propIDs.add(pid);
        claims[pid].forEach(c => {
          if (c.mainsnak && c.mainsnak.datavalue && c.mainsnak.datavalue.type === "wikibase-entityid") {
            valueQIDs.add(c.mainsnak.datavalue.value.id);
          }
          if (c.qualifiers) {
            for (const qpid in c.qualifiers) {
              propIDs.add(qpid);
              c.qualifiers[qpid].forEach(q => {
                if (q.datavalue && q.datavalue.type === "wikibase-entityid") {
                  valueQIDs.add(q.datavalue.value.id);
                }
              });
            }
          }
        });
      }

      const labels = await fetchLabels([...propIDs, ...valueQIDs]);
      const propLabels = {};
      const valueLabels = {};
      propIDs.forEach(pid => propLabels[pid] = labels[pid] || pid);
      valueQIDs.forEach(qid => valueLabels[qid] = labels[qid] || qid);

      // Detect archival-collection type to surface the finding-aid link.
      const COLLECTION_TYPE_LABELS = new Set(["archive", "archival collection"]);
      let isCollection = false;
      for (const pid in claims) {
        if ((propLabels[pid] || "").toLowerCase() !== "instance of") continue;
        claims[pid].forEach(c => {
          if (c.mainsnak && c.mainsnak.datavalue && c.mainsnak.datavalue.type === "wikibase-entityid") {
            const lbl = (valueLabels[c.mainsnak.datavalue.value.id] || "").toLowerCase();
            if (COLLECTION_TYPE_LABELS.has(lbl)) isCollection = true;
          }
        });
      }

      renderStatements(claims, propLabels, valueLabels);

      // Reverse references in parallel after the main render
      document.getElementById("status").style.display = "none";
      document.getElementById("item").style.display = "";
      renderFooter(qid, isCollection);

      const refs = await fetchReverseRefs(qid);
      renderReverse(refs, qid);

    } catch (err) {
      console.error(err);
      setStatus("Couldn't load item: " + err.message, "error");
    }
  })();
</script>

</body>
</html>
